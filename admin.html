<style>
  :root {
    --ink: #16233D;
    --ink-2: #2E4066;
    --gold: #A9813E;
    --gold-soft: #D9C08F;
    --line: #C9D2E0;
    --paper: #EEF1F6;
    --surface: #FFFFFF;
    --muted: #5B6B85;
    --success: #3F7A5C;
    --error: #B3432E;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; }

  .login-wrap {
    max-width: 400px;
    margin: 80px auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 2px 4px rgba(22,35,61,0.04), 0 12px 32px -16px rgba(22,35,61,0.18);
    padding: 40px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .login-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--ink), var(--gold));
  }
  .login-wrap h1 { font-size: 22px; margin: 0 0 4px; }
  .login-wrap .sub { font-size: 13px; color: var(--muted); margin: 0 0 24px; }
  .login-wrap input {
    display: block;
    width: 100%;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    background: var(--surface);
  }
  .login-wrap input:focus { border-color: var(--ink-2); box-shadow: 0 0 0 3px rgba(22,35,61,0.08); }
  .login-wrap input::placeholder { color: var(--muted); }
  .login-wrap .err { color: var(--error); font-size: 12.5px; margin: -4px 0 14px; padding: 8px 10px; background: #FBEAE5; border: 1px solid #EAC3B8; border-radius: 6px; display: none; text-align: left; }
  .login-wrap button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    width: 100%;
    padding: 13px 20px;
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    text-align: center;
    transition: background 0.2s ease, transform 0.1s ease;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .login-wrap button:hover { background: var(--ink-2); }
  .login-wrap button:active { transform: scale(0.98); }
  .login-wrap button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .shell {
    max-width: 1100px;
    margin: 24px auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(22,35,61,0.04), 0 12px 32px -16px rgba(22,35,61,0.18);
    overflow: hidden;
    position: relative;
  }
  .shell::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--ink) 0%, var(--ink-2) 55%, var(--gold) 100%);
  }
  .masthead {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
  }
  .masthead h1 { font-size: 22px; margin: 0; }
  .masthead .sub { font-size: 13px; color: var(--muted); margin: 2px 0 0; }
  .masthead .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    all: unset;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.15s ease;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: var(--ink-2); }
  .btn-ghost { color: var(--ink-2); border: 1.5px solid var(--line); background: var(--surface); }
  .btn-ghost:hover { border-color: var(--ink-2); }
  .btn-danger { background: var(--error); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }

  .hamburger { display: none; }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    gap: 0;
    overflow-x: auto;
  }
  .tab {
    all: unset;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--ink); border-bottom-color: var(--gold); }

  .panel { display: none; padding: 28px 32px; }
  .panel.active { display: block; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-card .label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--ink); margin-top: 4px; }
  .stat-card .note { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  th {
    background: var(--paper);
    font-weight: 700;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-2);
    position: sticky;
    top: 0;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(22,35,61,0.02); }
  th input[type=checkbox], td input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--ink); }

  .mean-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 200px;
  }
  .mean-bar {
    flex: 1;
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .mean-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .mean-val {
    font-weight: 700;
    font-size: 13px;
    min-width: 32px;
    text-align: right;
  }

  .interp {
    display: inline-block;
    font-size: 11.5px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .interp.excellent { background: #E8F5E9; color: #2E7D32; }
  .interp.good { background: #E3F2FD; color: #1565C0; }
  .interp.fair { background: #FFF8E1; color: #F57F17; }
  .interp.poor { background: #FBEAE5; color: var(--error); }

  .section-heading {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin: 28px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold);
  }
  .section-heading:first-child { margin-top: 0; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--line);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .export-menu { position: relative; display: inline-block; }
  .export-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 8px 24px -8px rgba(22,35,61,0.2);
    z-index: 10;
    min-width: 160px;
  }
  .export-dropdown.show { display: block; }
  .export-dropdown button {
    all: unset;
    display: block;
    width: 100%;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
  }
  .export-dropdown button:hover { background: var(--paper); }

  /* filters */
  .filter-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .filter-group select, .filter-group input {
    padding: 7px 10px;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    background: var(--surface);
    color: var(--ink);
  }
  .filter-group select:focus, .filter-group input:focus { outline: 2px solid var(--ink-2); border-color: var(--ink-2); }
  .filter-count { font-size: 12px; color: var(--muted); padding: 7px 0; }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(22,35,61,0.06);
    position: relative;
    overflow: hidden;
  }
  .chart-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--ink), var(--gold));
    border-radius: 12px 12px 0 0;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .chart-card:hover::before { opacity: 1; }
  .chart-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin: 0;
    color: var(--ink);
  }
  .chart-card .chart-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--paper);
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .chart-card .chart-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin: 4px 0 0;
  }
  .chart-card canvas { width: 100% !important; }
  .chart-card-wide { grid-column: 1 / -1; }
  .chart-card-half canvas { max-height: 240px; }

  @media print {
    body { background: #fff; color: #000; }
    .shell { box-shadow: none; border: 1px solid #ccc; max-width: 100%; margin: 0; border-radius: 0; }
    .shell::before { display: none; }
    .tabs { display: none; }
    .filter-bar { display: none; }
    .masthead .actions { display: none; }
    .panel { display: block !important; padding: 20px; }
    .stat-card { break-inside: avoid; background: #f5f5f5; }
    .chart-card { break-inside: avoid; }
    .chart-grid { page-break-after: always; }
    canvas { max-width: 100% !important; }
  }

  /* Methodology */
  .method-box {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
    font-size: 13.5px;
    color: var(--ink-2);
  }
  .method-box p { margin: 0 0 8px; }
  .method-box p:last-child { margin-bottom: 0; }
  .method-formula {
    font-family: "Courier New", Courier, monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    padding: 14px;
    margin: 10px 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    letter-spacing: 0.04em;
  }
  .method-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 6px 0;
  }
  .method-table th, .method-table td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  .method-table th {
    background: var(--paper);
    font-weight: 700;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-2);
  }
  .method-table tr:last-child td { border-bottom: none; }
  .method-mono {
    font-family: SFMono-Regular, Menlo, Consolas, monospace;
    font-weight: 600;
    color: var(--ink);
  }
  .method-vars { width: auto; margin: 8px 0; }
  .method-vars td { padding: 4px 16px 4px 0; border: none; font-size: 13px; }
  .method-vars td:first-child { min-width: 50px; }
  .method-example {
    margin-top: 12px;
    padding: 10px 14px;
    background: #E8F0FE;
    border: 1px solid #C9D2E0;
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink-2);
  }

  .hamburger {
    all: unset;
    cursor: pointer;
    display: none;
    font-size: 22px;
    padding: 10px 14px;
    color: var(--ink-2);
    user-select: none;
    transition: transform 0.25s ease, color 0.2s ease;
  }
  .hamburger:hover { color: var(--ink); }
  .hamburger.open { transform: rotate(90deg); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(22,35,61,0.25);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .panel { padding: 16px 14px; }
    .masthead {
      padding: 16px 14px;
      flex-direction: column;
      align-items: flex-start;
    }
    .masthead h1 { font-size: 18px; }
    .masthead .sub { font-size: 12px; }
    .masthead .actions { width: 100%; justify-content: flex-start; }
    .hamburger { display: block; }
    .tabs { display: flex; padding: 0; overflow: hidden; flex-direction: column; border-bottom: none; position: relative; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.25s ease, border-bottom-width 0.3s ease; }
    .tabs.tabs-open { max-height: 500px; opacity: 1; position: absolute; left: 0; right: 0; z-index: 50; background: var(--surface); border-bottom: 2px solid var(--gold); box-shadow: 0 8px 24px -8px rgba(22,35,61,0.2); }
    .tab { padding: 12px 14px; font-size: 12px; border-bottom: 1px solid var(--line); transform-origin: top; transition: background 0.15s ease; }
    .tab:hover { background: rgba(22,35,61,0.04); }
    .tab.active { border-bottom-color: var(--gold); border-bottom-style: solid; border-bottom-width: 2px; }
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { padding: 12px 14px; }
    .stat-card .value { font-size: 22px; }
    .stat-card .label { font-size: 10.5px; }
    .chart-grid { grid-template-columns: 1fr; }
    .chart-card { padding: 14px; }
    .chart-card h3 { font-size: 12px; }
    .filter-bar { flex-direction: column; gap: 6px; padding: 10px; }
    .filter-group { width: 100%; }
    .filter-group label { font-size: 9.5px; }
    .filter-group select, .filter-group input { width: 100%; padding: 5px 7px; font-size: 11.5px; }
    .filter-count { font-size: 10.5px; padding: 4px 0; }
    #f-reset { font-size: 10.5px; padding: 4px 8px; }
    .section-heading { font-size: 14px; margin: 20px 0 10px; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
    .mean-bar-wrap { min-width: 120px; }
    .btn { font-size: 12px; padding: 6px 12px; }
    .login-wrap { margin: 40px 16px; padding: 28px 20px 24px; }
    .login-wrap h1 { font-size: 20px; }
    .login-wrap .sub { font-size: 12px; margin-bottom: 18px; }
    .login-wrap input { padding: 10px 12px; font-size: 14px; }
    .login-wrap button { padding: 12px 16px; font-size: 13px; }
    /* Methodology mobile */
    .method-box { padding: 12px; font-size: 12.5px; }
    .method-formula { font-size: 15px; padding: 10px; }
    .method-table { font-size: 11.5px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .method-table th, .method-table td { padding: 6px 8px; }
    .method-vars td { font-size: 12px; padding: 3px 10px 3px 0; }
    .method-example { font-size: 12px; padding: 8px 10px; }
  }

  @media (min-width: 641px) and (max-width: 900px) {
    .panel { padding: 24px 24px; }
    .masthead { padding: 24px 24px 18px; }
    .tabs { padding: 0 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 901px) and (max-width: 1200px) {
    .shell { max-width: 1000px; }
  }

  /* ---- Ollama Chat ---- */
  #chat-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 900;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--ink); color: #fff; border: none; cursor: pointer;
    font-size: 22px; box-shadow: 0 4px 16px rgba(22,35,61,0.25);
    transition: transform 0.2s;
  }
  #chat-btn:hover { transform: scale(1.08); }
  #chat-panel {
    position: fixed; bottom: 88px; right: 24px; z-index: 899;
    width: 380px; max-height: 520px; background: var(--surface);
    border-radius: 12px; box-shadow: 0 8px 32px rgba(22,35,61,0.18);
    display: flex; flex-direction: column; overflow: hidden;
    transition: opacity 0.25s, transform 0.25s;
  }
  #chat-panel.closed { opacity: 0; transform: translateY(12px); pointer-events: none; }
  #chat-header {
    background: var(--ink); color: #fff; padding: 14px 18px; font-size: 14px; font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }
  #chat-header button { background: none; border: none; color: #fff; cursor: pointer; font-size: 18px; padding: 0 4px; opacity: 0.75; }
  #chat-header button:hover { opacity: 1; }
  #chat-msgs {
    flex: 1; overflow-y: auto; padding: 14px 16px; font-size: 13px;
    min-height: 200px;
  }
  #chat-msgs .msg { margin-bottom: 10px; line-height: 1.5; }
  #chat-msgs .msg.user { text-align: right; }
  #chat-msgs .msg.user span {
    display: inline-block; background: var(--ink); color: #fff;
    padding: 8px 14px; border-radius: 16px 16px 4px 16px; max-width: 85%;
  }
  #chat-msgs .msg.bot span {
    display: inline-block; background: var(--paper); color: var(--ink);
    padding: 8px 14px; border-radius: 4px 16px 16px 16px; max-width: 85%;
  }
  #chat-msgs .msg.error span {
    background: #FBEAE5; color: var(--error); border: 1px solid #EAC3B8;
  }
  #chat-msgs .msg.bot p { margin: 4px 0; }
  #chat-input-area {
    display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--line);
    align-items: flex-end;
  }
  #chat-input-area textarea {
    flex: 1; padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; outline: none; font-family: inherit; resize: none;
    min-height: 36px; max-height: 120px; line-height: 1.4;
  }
  #chat-input-area textarea:focus { border-color: var(--ink); }
  #chat-input-area button {
    background: var(--ink); color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; cursor: pointer; font-size: 13px;
  }

  function mean(arr) {
    if (!arr.length) return 0;

  function calcSectionMean(responses, section, itemStartNum) {

  function calcItemMean(responses, itemNum) {

  /* ---- Statistics helpers ---- */
  function stdDev(arr) {
    if (arr.length < 2) return 0;
    var m = mean(arr);
    var sumSq = arr.reduce(function(s, v) { return s + Math.pow(v - m, 2); }, 0);
    return Math.sqrt(sumSq / (arr.length - 1));
  }

  function freqCount(arr) {
    var counts = { 4: 0, 3: 0, 2: 0, 1: 0 };
    arr.forEach(function(v) { if (counts[v] !== undefined) counts[v]++; });
    return counts;

  function itemValues(responses, itemNum) {
    var vals = [];
    responses.forEach(function(r) {
      var v = (r.answers || {})[String(itemNum)];
      if (v) vals.push(v);
    });

  function sectionValues(responses, section, itemStartNum) {
    var vals = [];
    responses.forEach(function(r) {
      section.items.forEach(function(_, i) {
        var v = (r.answers || {})[String(itemStartNum + i)];
        if (v) vals.push(v);
      });
    });
    return vals;
  }

  function cronbachAlpha(responses) {
    var n = TOTAL_ITEMS;
    if (n < 2 || responses.length < 2) return null;
    
    var itemVariances = [];
    var validScores = []; /* Only include respondents with complete data */
    
    /* Calculate total scores only for complete responses */
    responses.forEach(function(res) {
      var score = 0;
      var completeItems = 0;
      for (var k = 1; k <= n; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) {
          score += v;
          completeItems++;
        }
      }
      /* Only include if they answered all items */
      if (completeItems === n) {
        validScores.push(score);
      }
    });
    
    if (validScores.length < 2) return null;
    
    var totalVar = Math.pow(stdDev(validScores), 2);
    
    /* Calculate item variances */
    for (var k2 = 1; k2 <= n; k2++) {
      var iv = itemValues(responses, k2);
      itemVariances.push(Math.pow(stdDev(iv), 2));
    }
    
    var sumItemVar = itemVariances.reduce(function(a, b) { return a + b; }, 0);
    if (totalVar === 0) return null;
    return (n / (n - 1)) * (1 - sumItemVar / totalVar);
  }

  function cronbachAlphaSection(responses, section, itemStartNum) {
    var n = section.items.length;
    if (n < 2 || responses.length < 2) return null;
    
    var itemVariances = [];
    var validScores = []; /* Only include respondents with complete section data */
    
    /* Calculate section total scores only for complete responses */
    responses.forEach(function(res) {
      var score = 0;
      var completeItems = 0;
      section.items.forEach(function(_, j) {
        var v = (res.answers || {})[String(itemStartNum + j)];
        if (v) {
          score += v;
          completeItems++;
        }
      });
      /* Only include if they answered all items in this section */
      if (completeItems === n) {
        validScores.push(score);
      }
    });
    
    if (validScores.length < 2) return null;
    
    var totalVar = Math.pow(stdDev(validScores), 2);
    
    /* Calculate item variances */
    section.items.forEach(function(_, j) {
      var vals = [];
      responses.forEach(function(r) {
        var v = (r.answers || {})[String(itemStartNum + j)];
        if (v) vals.push(v);
      });
      itemVariances.push(Math.pow(stdDev(vals), 2));
    });
    
    var sumItemVar = itemVariances.reduce(function(a, b) { return a + b; }, 0);
    if (totalVar === 0) return null;
    return (n / (n - 1)) * (1 - sumItemVar / totalVar);
  }

  function alphaLabel(a) {

  function pearsonCorr(x, y) {
    if (x.length < 2 || y.length < 2 || x.length !== y.length) return null;
    var n = x.length;
    var mx = mean(x), my = mean(y);
    var num = 0, dx2 = 0, dy2 = 0;
    for (var i = 0; i < n; i++) {
      var dx = x[i] - mx;
      var dy = y[i] - my;
      num += dx * dy;
      dx2 += dx * dx;
      dy2 += dy * dy;
    }
    var denom = Math.sqrt(dx2 * dy2);
    return denom === 0 ? 0 : num / denom;
  }

  function tTestIndependent(g1, g2) {
    if (g1.length < 2 || g2.length < 2) return null;
    var m1 = mean(g1), m2 = mean(g2);
    var v1 = Math.pow(stdDev(g1), 2), v2 = Math.pow(stdDev(g2), 2);
    var n1 = g1.length, n2 = g2.length;
    var se = Math.sqrt(v1/n1 + v2/n2);
    if (se === 0) return null;
    var t = (m1 - m2) / se;
    var num = v1/n1 + v2/n2;
    var df = Math.pow(num, 2) / (Math.pow(v1/n1, 2)/(n1-1) + Math.pow(v2/n2, 2)/(n2-1));
    var p = 2 * (1 - tCDF(Math.abs(t), df));
    return { t: t, df: df, p: p, mean1: m1, mean2: m2 };
  }

  function tCDF(t, df) {
    /* Better approximation of Student's t-distribution CDF using continued fraction */
    if (df <= 0) return 0.5;
    if (t === 0) return 0.5;
    
    var x = df / (df + t * t);
    var a = df / 2;
    var b = 0.5;
    
    /* Incomplete beta function approximation */
    if (x < 0 || x > 1) return 0.5;
    if (x === 0) return 0;
    if (x === 1) return 1;
    
    /* Use regularized incomplete beta function */
    var bt = Math.exp(
      lgamma(a + b) - lgamma(a) - lgamma(b) + 
      a * Math.log(x) + b * Math.log(1 - x)
    );
    
    if (x < (a + 1) / (a + b + 2)) {
      /* Use continued fraction directly */
      var betacf = betaContinuedFraction(a, b, x);
      return t < 0 ? 0.5 * bt * betacf / a : 1 - 0.5 * bt * betacf / a;
    } else {
      /* Use symmetry relation */
      var betacf = betaContinuedFraction(b, a, 1 - x);
      return t < 0 ? 1 - 0.5 * bt * betacf / b : 0.5 * bt * betacf / b;
    }
  }
  
  function betaContinuedFraction(a, b, x) {
    var maxIterations = 100;
    var epsilon = 3e-7;
    var qab = a + b;
    var qap = a + 1;
    var qam = a - 1;
    var c = 1;
    var d = 1 - qab * x / qap;
    
    if (Math.abs(d) < 1e-30) d = 1e-30;
    d = 1 / d;
    var h = d;
    
    for (var m = 1; m <= maxIterations; m++) {
      var m2 = 2 * m;
      var aa = m * (b - m) * x / ((qam + m2) * (a + m2));
      d = 1 + aa * d;
      if (Math.abs(d) < 1e-30) d = 1e-30;
      c = 1 + aa / c;
      if (Math.abs(c) < 1e-30) c = 1e-30;
      d = 1 / d;
      h *= d * c;
      
      aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
      d = 1 + aa * d;
      if (Math.abs(d) < 1e-30) d = 1e-30;
      c = 1 + aa / c;
      if (Math.abs(c) < 1e-30) c = 1e-30;
      d = 1 / d;
      var del = d * c;
      h *= del;
      
      if (Math.abs(del - 1) < epsilon) break;
    }
    
    return h;
  }

  function lgamma(x) {
    var c = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5];
    var y = x, tmp = x + 5.5;
    tmp -= (x + 0.5) * Math.log(tmp);
    var ser = 1.000000000190015;
    for (var j = 0; j < 6; j++) ser += c[j] / ++y;
    return -tmp + Math.log(2.5066282746310005 * ser / x);
  }

  function renderOverview(r) {
    var html = '<div class="panel active">';
    var n = r.length;
    var allVals = [];
    r.forEach(function(res) {
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) allVals.push(v);
      }
    });
    var overallMean = mean(allVals);
    var consentCount = r.filter(function(res) { return res.consent_given; }).length;
    var userTypes = {};
    r.forEach(function(res) {
      var t = res.respondent_user_type || "Unknown";
      userTypes[t] = (userTypes[t] || 0) + 1;
    });

    html += '<div class="stat-grid">';
    html += '<div class="stat-card"><div class="label">Total Responses</div><div class="value">' + n + '</div><div class="note">submissions collected</div></div>';

  function renderMeans(r) {
    var html = '<div class="panel active">';
    html += '<p style="font-size:13px;color:var(--muted);margin:0 0 18px;">Mean score for each statement across all ' + r.length + ' responses.</p>';

    SECTIONS.forEach(function(sec) {
      html += '<div class="section-heading">' + esc(sec.title) + '</div>';
      html += '<div class="table-wrap"><table><thead><tr><th style="width:40px">#</th><th>Statement</th><th style="width:240px">Mean</th><th>Score</th><th>Interpretation</th></tr></thead><tbody>';
      sec.items.forEach(function(text) {
        var m = calcItemMean(r, itemNum);
        var interp = interpret(m);
        html += '<tr>';
        html += '<td style="font-weight:700;color:var(--gold)">' + itemNum + '</td>';
        html += '<td>' + esc(text) + '</td>';
        html += '<td><div class="mean-bar-wrap"><div class="mean-bar"><div class="mean-bar-fill" style="width:' + (m / 4 * 100) + '%;background:' + barColor(m) + '"></div></div></div></td>';
        html += '<td style="font-weight:700">' + m.toFixed(2) + '</td>';
        html += '<td><span class="interp ' + interp.cls + '">' + interp.label + '</span></td>';
        html += '</tr>';
        itemNum++;
      });
      html += '</tbody></table></div>';
    });

    html += '<div class="section-heading">Interpretation Guide</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Mean Range</th><th>Interpretation</th><th>Description</th></tr></thead><tbody>';
    html += '<tr><td><span class="interp excellent">3.50 – 4.00</span></td><td><b>Excellent</b></td><td>Strongly Agree — respondents overwhelmingly agree</td></tr>';
    html += '<tr><td><span class="interp good">2.50 – 3.49</span></td><td><b>Good</b></td><td>Agree — respondents generally agree</td></tr>';
    html += '<tr><td><span class="interp fair">1.50 – 2.49</span></td><td><b>Fair</b></td><td>Disagree — respondents tend to disagree</td></tr>';
    html += '<tr><td><span class="interp poor">1.00 – 1.49</span></td><td><b>Poor</b></td><td>Strongly Disagree — respondents strongly disagree</td></tr>';

  /* ---- STATISTICS ---- */
  function renderStatistics(r) {
    var html = '<div class="panel active">';
    var n = r.length;
    if (!n) { html += '<div class="loading">No data to analyze.</div></div>'; return html; }

    /* Overall stats */
    var allVals = [];
    r.forEach(function(res) {
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) allVals.push(v);
      }
    });
    var overallMean = mean(allVals);
    var overallSD = stdDev(allVals);
    var alpha = cronbachAlpha(r);

    html += '<div class="section-heading">Overall Instrument Summary</div>';
    html += '<div class="stat-grid" style="grid-template-columns: repeat(4, 1fr);">';
    html += '<div class="stat-card"><div class="label">Sample Size (n)</div><div class="value">' + n + '</div></div>';
    html += '<div class="stat-card"><div class="label">Items</div><div class="value">' + TOTAL_ITEMS + '</div></div>';
    html += '<div class="stat-card"><div class="label">Scale Range</div><div class="value">1 – 4</div><div class="note">4-point Likert</div></div>';
    html += '<div class="stat-card"><div class="label">Cronbach\u2019s α</div><div class="value">' + (alpha !== null ? alpha.toFixed(3) : "N/A") + '</div><div class="note">' + alphaLabel(alpha) + '</div></div>';
    html += '</div>';
    html += '<div class="stat-grid" style="grid-template-columns: repeat(3, 1fr);">';
    html += '<div class="stat-card"><div class="label">Overall Mean</div><div class="value">' + overallMean.toFixed(2) + '</div></div>';
    html += '<div class="stat-card"><div class="label">Std. Deviation</div><div class="value">' + overallSD.toFixed(2) + '</div></div>';
    html += '<div class="stat-card"><div class="label">Interpretation</div><div class="value" style="color:var(--' + (overallMean >= 3.5 ? "success" : overallMean >= 2.5 ? "ink-2" : overallMean >= 1.5 ? "gold" : "error") + ')">' + interpret(overallMean).label + '</div></div>';
    html += '</div>';

    /* Section-level statistics */
    html += '<div class="section-heading">Section Statistics</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Section</th><th>n</th><th>Mean</th><th>SD</th><th>α</th><th>Min</th><th>Max</th><th>Interpretation</th></tr></thead><tbody>';
    var itemNum = 1;
    SECTIONS.forEach(function(sec) {
      var sv = sectionValues(r, sec, itemNum);
      var secMean = mean(sv);
      var secSD = stdDev(sv);
      var secAlpha = cronbachAlphaSection(r, sec, itemNum);
      var secMin = sv.length ? Math.min.apply(null, sv) : "-";
      var secMax = sv.length ? Math.max.apply(null, sv) : "-";
      var interp = interpret(secMean);
      html += '<tr>';
      html += '<td>' + esc(sec.title) + '</td>';
      html += '<td>' + sv.length + '</td>';
      html += '<td><b>' + secMean.toFixed(2) + '</b></td>';
      html += '<td>' + secSD.toFixed(2) + '</td>';
      html += '<td style="font-weight:700">' + (secAlpha !== null ? secAlpha.toFixed(3) : "\u2014") + '<br><span style="font-weight:400;font-size:11px;color:var(--muted)">' + alphaLabel(secAlpha) + '</span></td>';
      html += '<td>' + secMin + '</td>';
      html += '<td>' + secMax + '</td>';
      html += '<td><span class="interp ' + interp.cls + '">' + interp.label + '</span></td>';
      html += '</tr>';
      itemNum += sec.items.length;
    });
    html += '</tbody></table></div>';

    /* Item-level statistics with frequency */
    html += '<div class="section-heading">Item Analysis with Frequency Distribution</div>';
    itemNum = 1;
    SECTIONS.forEach(function(sec) {
      html += '<h3 style="font-size:14px;margin:20px 0 8px;">' + esc(sec.title) + '</h3>';
      html += '<div class="table-wrap"><table><thead><tr><th>#</th><th>Statement</th><th>n</th><th>Mean</th><th>SD</th><th>Interpretation</th><th style="color:#2E7D32">SA</th><th style="color:#1565C0">A</th><th style="color:#F57F17">D</th><th style="color:#B3432E">SD</th></tr></thead><tbody>';
      sec.items.forEach(function(text) {
        var iv = itemValues(r, itemNum);
        var im = mean(iv);
        var isd = stdDev(iv);
        var interp = interpret(im);
        var fc = freqCount(iv);
        var nn = iv.length;
        html += '<tr>';
        html += '<td style="font-weight:700;color:var(--gold)">' + itemNum + '</td>';
        html += '<td>' + esc(text) + '</td>';
        html += '<td>' + nn + '</td>';
        html += '<td><b>' + im.toFixed(2) + '</b></td>';
        html += '<td>' + isd.toFixed(2) + '</td>';
        html += '<td><span class="interp ' + interp.cls + '">' + interp.label + '</span></td>';
        html += '<td>' + fc[4] + ' <span style="color:var(--muted)">(' + (nn ? (fc[4]/nn*100).toFixed(1) : 0) + '%)</span></td>';
        html += '<td>' + fc[3] + ' <span style="color:var(--muted)">(' + (nn ? (fc[3]/nn*100).toFixed(1) : 0) + '%)</span></td>';
        html += '<td>' + fc[2] + ' <span style="color:var(--muted)">(' + (nn ? (fc[2]/nn*100).toFixed(1) : 0) + '%)</span></td>';
        html += '<td>' + fc[1] + ' <span style="color:var(--muted)">(' + (nn ? (fc[1]/nn*100).toFixed(1) : 0) + '%)</span></td>';
        html += '</tr>';
        itemNum++;
      });
      html += '</tbody></table></div>';
    });

    /* Correlation matrix */
    html += '<div class="section-heading">Inter-Section Correlation Matrix (Pearson r)</div>';
    html += '<div class="table-wrap"><table><thead><tr><th></th>';
    SECTIONS.forEach(function(sec) {
      html += '<th>' + esc(sec.title.replace(/^[A-Z]\.\s*/, "")) + '</th>';
    });
    html += '</tr></thead><tbody>';
    var secVals = [];
    var sNum = 1;
    SECTIONS.forEach(function(sec) {
      secVals.push(sectionValues(r, sec, sNum));
      sNum += sec.items.length;
    });
    SECTIONS.forEach(function(sec, i) {
      html += '<tr><td style="font-weight:700">' + esc(sec.title.replace(/^[A-Z]\.\s*/, "")) + '</td>';
      SECTIONS.forEach(function(_, j) {
        var corr = pearsonCorr(secVals[i], secVals[j]);
        var clr = "";
        if (i !== j && corr !== null) {
          var abs = Math.abs(corr);
          if (abs >= 0.7) clr = "color:var(--success);font-weight:700";
          else if (abs >= 0.4) clr = "color:var(--ink-2);font-weight:600";
        }
        html += '<td style="text-align:center;' + clr + '">' + (corr !== null ? corr.toFixed(3) : "-") + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<p style="font-size:11px;color:var(--muted);margin:0 0 20px;">* Values ≥ 0.70 = strong correlation, 0.40–0.69 = moderate, &lt;0.40 = weak</p>';

    /* T-test: Student vs Faculty */
    var students = r.filter(function(res) { return res.respondent_user_type === "Student"; });
    var faculty = r.filter(function(res) { return res.respondent_user_type === "Faculty / Teacher"; });
    if (students.length >= 2 && faculty.length >= 2) {
      html += '<div class="section-heading">Independent Samples T-Test: Student vs Faculty</div>';
      html += '<div class="table-wrap"><table><thead><tr><th>Section</th><th>Student Mean</th><th>Faculty Mean</th><th>t</th><th>df</th><th>p-value</th><th>Sig.</th></tr></thead><tbody>';
      sNum = 1;
      SECTIONS.forEach(function(sec) {
        var sVals = sectionValues(students, sec, sNum);
        var fVals = sectionValues(faculty, sec, sNum);
        var tt = tTestIndependent(sVals, fVals);
        if (tt) {
          var sig = tt.p < 0.001 ? "***" : tt.p < 0.01 ? "**" : tt.p < 0.05 ? "*" : "ns";
          html += '<tr>';
          html += '<td>' + esc(sec.title) + '</td>';
          html += '<td>' + tt.mean1.toFixed(2) + ' (n=' + students.length + ')</td>';
          html += '<td>' + tt.mean2.toFixed(2) + ' (n=' + faculty.length + ')</td>';
          html += '<td>' + tt.t.toFixed(3) + '</td>';
          html += '<td>' + tt.df + '</td>';
          html += '<td>' + tt.p.toFixed(4) + '</td>';
          html += '<td style="font-weight:700">' + sig + '</td>';
          html += '</tr>';
        }
        sNum += sec.items.length;
      });
      html += '</tbody></table></div>';
      html += '<p style="font-size:11px;color:var(--muted);margin:0 0 20px;">* p &lt; 0.05, ** p &lt; 0.01, *** p &lt; 0.001, ns = not significant</p>';
    }

    html += '</div>';
    return html;
  }

  /* ---- BY USER TYPE ---- */

    var types = {};
    r.forEach(function(res) {
      var t = res.respondent_user_type || "Unknown";
      if (!types[t]) types[t] = [];
      types[t].push(res);
    });

    html += '<p style="font-size:13px;color:var(--muted);margin:0 0 18px;">Comparison of mean scores across user types for each section.</p>';

    html += '<div class="section-heading">Section Means by User Type</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Section</th>';
    typeKeys.forEach(function(t) { html += '<th>' + esc(t) + ' (n=' + types[t].length + ')</th>'; });
    html += '<th>All</th></tr></thead><tbody>';
    var itemNum = 1;
    SECTIONS.forEach(function(sec) {
      html += '<tr><td>' + esc(sec.title) + '</td>';
      var allM = calcSectionMean(r, sec, itemNum);
      typeKeys.forEach(function(t) {
        var m = calcSectionMean(types[t], sec, itemNum);
        var interp = interpret(m);
        html += '<td><span class="interp ' + interp.cls + '">' + m.toFixed(2) + '</span></td>';
      });
      var allInterp = interpret(allM);
      html += '<td><b>' + allM.toFixed(2) + '</b> <span class="interp ' + allInterp.cls + '">' + allInterp.label + '</span></td>';
      html += '</tr>';
      itemNum += sec.items.length;
    });
    html += '</tbody></table></div>';

    html += '<div class="section-heading">Per-Question Breakdown by User Type</div>';

    SECTIONS.forEach(function(sec) {
      html += '<h3 style="font-size:14px;margin:20px 0 8px;">' + esc(sec.title) + '</h3>';
      html += '<div class="table-wrap"><table><thead><tr><th style="width:30px">#</th><th>Statement</th>';
      typeKeys.forEach(function(t) { html += '<th>' + esc(t) + '</th>'; });
      html += '</tr></thead><tbody>';
      sec.items.forEach(function(text) {
        html += '<tr><td style="font-weight:700;color:var(--gold)">' + itemNum + '</td><td>' + esc(text) + '</td>';

          var m = calcItemMean(types[t], itemNum);
          var interp = interpret(m);

        });
        html += '</tr>';
        itemNum++;
      });
      html += '</tbody></table></div>';
    });

    html += '</div>';
    return html;
  }

  var SORT = { col: "submitted", dir: -1 };

  function sortArrow(col) {
    if (SORT.col !== col) return "";
    return SORT.dir === 1 ? " \u25B2" : " \u25BC";
  }

  function hasQualityFlags(res) {
    var flags = [];
    var vals = [];
    for (var k = 1; k <= TOTAL_ITEMS; k++) {
      var v = (res.answers || {})[String(k)];
      if (v) vals.push(v);
    }
    var m = mean(vals);
    var sd = vals.length > 1 ? stdDev(vals) : 0;
    if (sd < 0.3 && vals.length >= 5) flags.push("Straight-line");
    if (res.time_taken_sec !== null && res.time_taken_sec < 120) flags.push("Speeder");
    var missingCount = TOTAL_ITEMS - vals.length;
    if (missingCount > 3) flags.push(missingCount + " missing");
    return flags;
  }

      html += '<div class="loading">No responses match your filters.</div>';
      html += '</div>';
      return html;

    var startRow = (STATE.page - 1) * STATE.pageSize + 1;

    html += '<p style="font-size:13px;color:var(--muted);margin:0;">Page <b>' + STATE.page + '</b> of <b>' + totalPages + '</b> (' + r.length + ' total responses' + (selectedCount ? ', <b>' + selectedCount + '</b> selected' : '') + ')</p>';
    html += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';

    html += '<div class="table-wrap"><table><thead><tr>';
    html += '<th style="width:32px"><input type="checkbox" id="select-all" ' + (pageData.every(function(res) { return STATE.selectedIds[res.id]; }) && pageData.length ? 'checked' : '') + ' /></th>';
    html += '<th style="width:40px"><button class="sort-btn" data-sort="num" style="all:unset;cursor:pointer;font-weight:inherit">#' + sortArrow("num") + '</button></th>';
    html += '<th><button class="sort-btn" data-sort="ref" style="all:unset;cursor:pointer;font-weight:inherit">Reference' + sortArrow("ref") + '</button></th>';
    html += '<th><button class="sort-btn" data-sort="date" style="all:unset;cursor:pointer;font-weight:inherit">Submitted' + sortArrow("date") + '</button></th>';
    html += '<th><button class="sort-btn" data-sort="name" style="all:unset;cursor:pointer;font-weight:inherit">Name' + sortArrow("name") + '</button></th>';
    html += '<th>Age</th><th>Sex</th><th>User Type</th><th>Consent</th><th>Consent v</th><th>Flags</th>';
    for (var k = 1; k <= TOTAL_ITEMS; k++) html += '<th>Q' + k + '</th>';
    html += '<th><button class="sort-btn" data-sort="mean" style="all:unset;cursor:pointer;font-weight:inherit">Mean' + sortArrow("mean") + '</button></th>';
    html += '<th>Comments</th></tr></thead><tbody>';
    var sorted = r.slice().sort(function(a, b) {
      var va, vb;
      switch (SORT.col) {
        case "num": va = r.indexOf(a); vb = r.indexOf(b); break;
        case "ref": va = (a.id || "").toUpperCase(); vb = (b.id || "").toUpperCase(); break;
        case "date": va = a.submitted_at || ""; vb = b.submitted_at || ""; break;
        case "name": va = (a.respondent_name || "").toLowerCase(); vb = (b.respondent_name || "").toLowerCase(); break;
        case "mean":
          var av = [], bv = [];
          for (var k3 = 1; k3 <= TOTAL_ITEMS; k3++) { var v3 = (a.answers || {})[String(k3)]; if (v3) av.push(v3); }
          for (var k4 = 1; k4 <= TOTAL_ITEMS; k4++) { var v4 = (b.answers || {})[String(k4)]; if (v4) bv.push(v4); }
          va = mean(av); vb = mean(bv); break;
        default: va = ""; vb = "";
      }
      if (va < vb) return -1 * SORT.dir;
      if (va > vb) return 1 * SORT.dir;
      return 0;
    });
    pageData.forEach(function(res) {

        if (v) vals.push(v);
      }
      var m = mean(vals);
      var interp = interpret(m);
      var dt = res.submitted_at ? new Date(res.submitted_at).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" }) : "\u2014";
      var flags = hasQualityFlags(res);
      html += '<tr class="resp-row" data-id="' + res.id + '">';

      startRow++;
      html += '<td style="font-family:monospace;font-size:12px">' + (res.id ? res.id.slice(0, 8).toUpperCase() : "\u2014") + '</td>';
      html += '<td>' + dt + '</td>';
      html += '<td>' + esc(res.respondent_name || "\u2014") + '</td>';
      html += '<td>' + (res.respondent_age || "\u2014") + '</td>';
      html += '<td>' + esc(res.respondent_sex || "\u2014") + '</td>';
      html += '<td>' + esc(res.respondent_user_type || "\u2014") + '</td>';
      html += '<td style="text-align:center">' + (res.consent_given ? '<span style="color:var(--success)">&#10003;</span>' : '<span style="color:var(--error)">&#10007;</span>') + '</td>';
      html += '<td style="font-size:11px;color:var(--muted);text-align:center">' + esc(res.consent_version || "v1.0") + '</td>';
      html += '<td style="font-size:11px;max-width:100px;">' + (flags.length ? flags.map(function(f) { return '<span style="display:inline-block;background:#FFF3CD;color:#856404;padding:1px 6px;border-radius:4px;margin:1px;font-size:10px;">' + f + '</span>'; }).join("") : '<span style="color:var(--success)">&#10003;</span>') + '</td>';
      for (var k2 = 1; k2 <= TOTAL_ITEMS; k2++) {
        var v2 = (res.answers || {})[String(k2)];
        html += '<td style="text-align:center">' + (v2 || "\u2014") + '</td>';
      }
      html += '<td style="font-weight:700"><span class="interp ' + interp.cls + '">' + m.toFixed(2) + '</span></td>';
      html += '<td style="max-width:180px;white-space:normal;font-size:12px">' + esc(res.comments || "\u2014") + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    /* pagination controls */
    html += '<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid var(--line);">';
    html += '<button class="btn btn-ghost btn-sm" id="page-prev"' + (STATE.page <= 1 ? ' disabled style="opacity:0.4"' : '') + '>&larr; Previous</button>';
    html += '<span style="font-size:13px;color:var(--muted);">Page ' + STATE.page + ' of ' + totalPages + '</span>';
    html += '<button class="btn btn-ghost btn-sm" id="page-next"' + (STATE.page >= totalPages ? ' disabled style="opacity:0.4"' : '') + '>Next &rarr;</button>';
    html += '</div>';

    html += '</div>';

  function renderMethodology(r) {
    var html = '<div class="panel active">';
    var n = r.length;
    var allVals = [];
    r.forEach(function(res) {
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) allVals.push(v);
      }
    });
    var overallMean = mean(allVals);
    var overallSD = stdDev(allVals);
    var alpha = cronbachAlpha(r);

    html += '<div class="section-heading">1. Likert Scale</div>';
    html += '<div class="method-box">';
    html += '<p>Each statement is rated on a <b>4-point Likert scale</b>:</p>';
    html += '<table class="method-table"><thead><tr><th>Value</th><th>Label</th><th>Meaning</th></tr></thead><tbody>';
    html += '<tr><td class="method-mono">4</td><td>Strongly Agree (SA)</td><td>Respondent strongly agrees with the statement</td></tr>';
    html += '<tr><td class="method-mono">3</td><td>Agree (A)</td><td>Respondent agrees with the statement</td></tr>';
    html += '<tr><td class="method-mono">2</td><td>Disagree (D)</td><td>Respondent disagrees with the statement</td></tr>';
    html += '<tr><td class="method-mono">1</td><td>Strongly Disagree (SD)</td><td>Respondent strongly disagrees with the statement</td></tr>';
    html += '</tbody></table>';
    html += '</div>';

    html += '<div class="section-heading">2. Mean (Average Score)</div>';
    html += '<div class="method-box">';
    html += '<p>The mean is the arithmetic average of all ratings for an item or section.</p>';
    html += '<div class="method-formula">x̄ = (Σ xᵢ) / n</div>';
    html += '<table class="method-vars"><tbody>';
    html += '<tr><td class="method-mono">x̄</td><td>= sample mean</td></tr>';
    html += '<tr><td class="method-mono">Σ xᵢ</td><td>= sum of all ratings</td></tr>';
    html += '<tr><td class="method-mono">n</td><td>= number of responses</td></tr>';
    html += '<tr><td class="method-mono">xᵢ</td><td>= individual rating (1, 2, 3, or 4)</td></tr>';
    html += '</tbody></table>';
    html += '<div class="method-example">Example: Current overall mean = <b>' + overallMean.toFixed(2) + '</b> across ' + allVals.length + ' ratings from ' + n + ' responses.</div>';
    html += '</div>';

    html += '<div class="section-heading">3. Standard Deviation</div>';
    html += '<div class="method-box">';
    html += '<p>Standard deviation measures the spread or dispersion of ratings around the mean. A low SD means ratings are clustered close to the mean; a high SD indicates wide variation.</p>';
    html += '<div class="method-formula">s = √( Σ(xᵢ − x̄)² / (n − 1) )</div>';
    html += '<table class="method-vars"><tbody>';
    html += '<tr><td class="method-mono">s</td><td>= sample standard deviation</td></tr>';
    html += '<tr><td class="method-mono">xᵢ − x̄</td><td>= deviation of each rating from the mean</td></tr>';
    html += '<tr><td class="method-mono">(n − 1)</td><td>= degrees of freedom (Bessel\'s correction)</td></tr>';
    html += '</tbody></table>';
    html += '<div class="method-example">Example: Current overall SD = <b>' + overallSD.toFixed(2) + '</b>.</div>';
    html += '</div>';

    html += '<div class="section-heading">4. Frequency Distribution</div>';
    html += '<div class="method-box">';
    html += '<p>For each item, responses are tallied by Likert value and shown both as raw counts and percentages.</p>';
    html += '<div class="method-formula">% = (count of value / total responses for item) × 100</div>';
    html += '</div>';

    html += '<div class="section-heading">5. Interpretation Scale</div>';
    html += '<div class="method-box">';
    html += '<p>The computed mean is mapped to a qualitative interpretation:</p>';
    html += '<table class="method-table"><thead><tr><th>Mean Range</th><th>Interpretation</th><th>Description</th></tr></thead><tbody>';
    html += '<tr><td class="method-mono">3.50 – 4.00</td><td><span class="interp excellent">Excellent</span></td><td>Strongly Agree — respondents overwhelmingly agree</td></tr>';
    html += '<tr><td class="method-mono">2.50 – 3.49</td><td><span class="interp good">Good</span></td><td>Agree — respondents generally agree</td></tr>';
    html += '<tr><td class="method-mono">1.50 – 2.49</td><td><span class="interp fair">Fair</span></td><td>Disagree — respondents tend to disagree</td></tr>';
    html += '<tr><td class="method-mono">1.00 – 1.49</td><td><span class="interp poor">Poor</span></td><td>Strongly Disagree — respondents strongly disagree</td></tr>';
    html += '</tbody></table>';
    html += '<div class="method-example">Result: The current overall mean of <b>' + overallMean.toFixed(2) + '</b> is interpreted as <b>' + interpret(overallMean).label + '</b>.</div>';
    html += '</div>';

    html += '<div class="section-heading">6. Cronbach\'s Alpha (Reliability)</div>';
    html += '<div class="method-box">';
    html += '<p>Cronbach\'s alpha measures internal consistency — how closely related the items are as a group. It is computed from the pairwise correlations between items.</p>';
    html += '<div class="method-formula">α = (k / (k − 1)) × (1 − (Σ s²ᵢ / s²ₜ))</div>';
    html += '<table class="method-vars"><tbody>';
    html += '<tr><td class="method-mono">k</td><td>= number of items</td></tr>';
    html += '<tr><td class="method-mono">s²ᵢ</td><td>= variance of item i</td></tr>';
    html += '<tr><td class="method-mono">s²ₜ</td><td>= variance of total scores (sum of all items per respondent)</td></tr>';
    html += '</tbody></table>';
    html += '<table class="method-table" style="margin-top:12px;"><thead><tr><th>Alpha Range</th><th>Interpretation</th></tr></thead><tbody>';
    html += '<tr><td class="method-mono">α ≥ 0.9</td><td>Excellent internal consistency</td></tr>';
    html += '<tr><td class="method-mono">0.8 ≤ α < 0.9</td><td>Good internal consistency</td></tr>';
    html += '<tr><td class="method-mono">0.7 ≤ α < 0.8</td><td>Acceptable internal consistency</td></tr>';
    html += '<tr><td class="method-mono">0.6 ≤ α < 0.7</td><td>Questionable internal consistency</td></tr>';
    html += '<tr><td class="method-mono">α < 0.6</td><td>Poor internal consistency</td></tr>';
    html += '</tbody></table>';
    html += '<div class="method-example">Result: Current overall α = <b>' + (alpha !== null ? alpha.toFixed(3) : "N/A") + '</b> — <b>' + alphaLabel(alpha) + '</b>.</div>';
    html += '</div>';

    html += '<div class="section-heading">7. Pearson Correlation (Inter-Section)</div>';
    html += '<div class="method-box">';
    html += '<p>Pearson\'s r measures the strength and direction of the linear relationship between two sections\' scores.</p>';
    html += '<div class="method-formula">r = Σ((xᵢ − x̄)(yᵢ − ȳ)) / √(Σ(xᵢ − x̄)² × Σ(yᵢ − ȳ)²)</div>';
    html += '<table class="method-vars"><tbody>';
    html += '<tr><td class="method-mono">r</td><td>= Pearson correlation coefficient (−1 to +1)</td></tr>';
    html += '<tr><td class="method-mono">xᵢ, yᵢ</td><td>= paired scores from the two sections</td></tr>';
    html += '<tr><td class="method-mono">x̄, ȳ</td><td>= means of the respective sections</td></tr>';
    html += '</tbody></table>';
    html += '<table class="method-table" style="margin-top:12px;"><thead><tr><th>|r| Range</th><th>Interpretation</th></tr></thead><tbody>';
    html += '<tr><td class="method-mono">|r| ≥ 0.70</td><td>Strong correlation</td></tr>';
    html += '<tr><td class="method-mono">0.40 ≤ |r| < 0.70</td><td>Moderate correlation</td></tr>';
    html += '<tr><td class="method-mono">|r| < 0.40</td><td>Weak correlation</td></tr>';
    html += '</tbody></table>';
    html += '</div>';

    html += '<div class="section-heading">8. Independent Samples T-Test</div>';
    html += '<div class="method-box">';
    html += '<p>Welch\'s t-test determines whether the mean scores of two independent groups (e.g., Students vs. Faculty) are statistically significantly different.</p>';
    html += '<div class="method-formula">t = (x̄₁ − x̄₂) / √(s²₁/n₁ + s²₂/n₂)</div>';
    html += '<table class="method-vars"><tbody>';
    html += '<tr><td class="method-mono">t</td><td>= test statistic</td></tr>';
    html += '<tr><td class="method-mono">x̄₁, x̄₂</td><td>= means of group 1 and group 2</td></tr>';
    html += '<tr><td class="method-mono">s²₁, s²₂</td><td>= variances of group 1 and group 2</td></tr>';
    html += '<tr><td class="method-mono">n₁, n₂</td><td>= sample sizes</td></tr>';
    html += '</tbody></table>';
    html += '<p style="margin-top:10px;">Degrees of freedom are approximated using the Welch–Satterthwaite equation. The p-value is computed from the t-distribution CDF. A p-value less than 0.05 indicates a statistically significant difference at the 95% confidence level.</p>';
    html += '<table class="method-table" style="margin-top:12px;"><thead><tr><th>p-value</th><th>Significance</th></tr></thead><tbody>';
    html += '<tr><td class="method-mono">p < 0.001</td><td>Highly significant (***)</td></tr>';
    html += '<tr><td class="method-mono">p < 0.01</td><td>Very significant (**)</td></tr>';
    html += '<tr><td class="method-mono">p < 0.05</td><td>Significant (*)</td></tr>';
    html += '<tr><td class="method-mono">p ≥ 0.05</td><td>Not significant (ns)</td></tr>';
    html += '</tbody></table>';
    html += '</div>';

    html += '<div class="section-heading">JavaScript Implementation Reference</div>';
    html += '<div class="method-box">';
    html += '<p>All calculations run client-side in your browser. The relevant functions are in <code>admin.html</code>:</p>';
    html += '<table class="method-table"><thead><tr><th>Function</th><th>Location</th><th>Purpose</th></tr></thead><tbody>';
    html += '<tr><td class="method-mono">mean(arr)</td><td>Line 531</td><td>Computes arithmetic mean</td></tr>';
    html += '<tr><td class="method-mono">stdDev(arr)</td><td>Line 557</td><td>Computes sample standard deviation</td></tr>';
    html += '<tr><td class="method-mono">freqCount(arr)</td><td>Line 564</td><td>Tally Likert frequencies</td></tr>';
    html += '<tr><td class="method-mono">cronbachAlpha(resp)</td><td>Line 590</td><td>Overall reliability coefficient</td></tr>';
    html += '<tr><td class="method-mono">cronbachAlphaSection(r, s, n)</td><td>Line 612</td><td>Per-section reliability coefficient</td></tr>';
    html += '<tr><td class="method-mono">pearsonCorr(x, y)</td><td>Line 647</td><td>Inter-section Pearson correlation</td></tr>';
    html += '<tr><td class="method-mono">tTestIndependent(g1, g2)</td><td>Line 663</td><td>Welch\'s independent t-test</td></tr>';
    html += '<tr><td class="method-mono">interpret(mean)</td><td>Line 517</td><td>Maps mean to qualitative label</td></tr>';
    html += '</tbody></table>';
    html += '</div>';

    html += '</div>';
    return html;
  }

  function renderDemographics(r) {
    var html = '<div class="panel active">';
    var n = r.length;
    var sexCounts = {};
    r.forEach(function(res) { var s = res.respondent_sex || "Unknown"; sexCounts[s] = (sexCounts[s] || 0) + 1; });
    html += '<div class="section-heading">Sex Distribution</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Sex</th><th>Count</th><th>Percentage</th></tr></thead><tbody>';
    Object.keys(sexCounts).forEach(function(k) {
      html += '<tr><td>' + esc(k) + '</td><td>' + sexCounts[k] + '</td><td>' + (n ? (sexCounts[k]/n*100).toFixed(1) : 0) + '%</td></tr>';
    });
    html += '</tbody></table></div>';

    var typeCounts = {};
    r.forEach(function(res) { var t = res.respondent_user_type || "Unknown"; typeCounts[t] = (typeCounts[t] || 0) + 1; });
    html += '<div class="section-heading">User Type Distribution</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>User Type</th><th>Count</th><th>Percentage</th></tr></thead><tbody>';
    Object.keys(typeCounts).forEach(function(k) {
      html += '<tr><td>' + esc(k) + '</td><td>' + typeCounts[k] + '</td><td>' + (n ? (typeCounts[k]/n*100).toFixed(1) : 0) + '%</td></tr>';
    });
    html += '</tbody></table></div>';

    var ages = [];
    r.forEach(function(res) { if (res.respondent_age) ages.push(Number(res.respondent_age)); });
    if (ages.length) {
      html += '<div class="section-heading">Age Statistics</div>';
      html += '<div class="stat-grid">';
      html += '<div class="stat-card"><div class="label">Lowest Age</div><div class="value">' + Math.min.apply(null, ages) + '</div></div>';
      html += '<div class="stat-card"><div class="label">Highest Age</div><div class="value">' + Math.max.apply(null, ages) + '</div></div>';
      html += '<div class="stat-card"><div class="label">Average Age</div><div class="value">' + mean(ages).toFixed(1) + '</div></div>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  /* render */
  function render() {
    var app = document.getElementById("admin-root");
    if (!app) return;
    if (!STATE.loggedIn) {
      app.innerHTML = renderLogin();
      attachLoginHandlers();
      return;
    }
    if (STATE.loading) {
      app.innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted);font-size:14px;">Loading responses\u2026</div>';
      return;
    }
    if (STATE.loadError) {
      app.innerHTML = '<div style="padding:60px;text-align:center;"><p style="color:var(--error);">' + esc(STATE.loadError) + '</p><button class="btn btn-primary" onclick="location.reload()">Retry</button></div>';
      return;
    }
    app.innerHTML = renderDashboard() + renderDetailModal() + renderChatUI();
    if (STATE.detailResponse) showDetailModal(STATE.detailResponse);
    attachDashboardHandlers();
    attachChatHandlers();
  }

  /* ---- Response Detail Modal ---- */
  function renderDetailModal() {
    return (
      '<div id="detail-modal-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(22,35,61,0.5);z-index:1000;overflow-y:auto;" onclick="if(event.target===this)closeDetailModal()">' +
        '<div id="detail-modal-content" style="max-width:700px;margin:40px auto;background:#fff;border-radius:12px;padding:28px 32px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.2);">' +
          '<button onclick="closeDetailModal()" style="position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink-2);" aria-label="Close">&times;</button>' +
          '<div id="detail-modal-body"></div>' +
        '</div>' +
      '</div>'
    );

  function showDetailModal(res) {
    var overlay = document.getElementById("detail-modal-overlay");
    var body = document.getElementById("detail-modal-body");
    if (!overlay || !body) return;
    var vals = [];
    for (var k = 1; k <= TOTAL_ITEMS; k++) {
      var v = (res.answers || {})[String(k)];
      if (v) vals.push(v);
    }
    var m = mean(vals);
    var interp = interpret(m);
    var flags = hasQualityFlags(res);
    var html = '<h2 style="margin:0 0 4px;font-size:18px;">Response Detail</h2>';
    html += '<p style="color:var(--muted);font-size:12px;margin:0 0 18px;">Reference: <code>' + esc(res.id || "") + '</code></p>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:13px;">';
    html += '<div><b>Submitted</b><br>' + (res.submitted_at ? new Date(res.submitted_at).toLocaleString() : "\u2014") + '</div>';
    html += '<div><b>Name</b><br>' + esc(res.respondent_name || "\u2014") + '</div>';
    html += '<div><b>Age</b><br>' + (res.respondent_age || "\u2014") + '</div>';
    html += '<div><b>Sex</b><br>' + esc(res.respondent_sex || "\u2014") + '</div>';
    html += '<div><b>User Type</b><br>' + esc(res.respondent_user_type || "\u2014") + '</div>';
    html += '<div><b>Consent</b><br>' + (res.consent_given ? "Yes" : "No") + ' (v' + esc(res.consent_version || "1.0") + ')</div>';
    html += '<div><b>Time Taken</b><br>' + (res.time_taken_sec ? Math.round(res.time_taken_sec / 60) + " min " + (res.time_taken_sec % 60) + " sec" : "\u2014") + '</div>';
    html += '<div><b>Locale</b><br>' + esc(res.locale || "en") + '</div>';
    html += '<div><b>Overall Mean</b><br>' + m.toFixed(2) + ' (' + interp.label + ')</div>';
    html += '<div><b>Quality Flags</b><br>' + (flags.length ? flags.join(", ") : "None") + '</div>';
    html += '</div>';

    html += '<h3 style="font-size:14px;margin:0 0 8px;">Answers by Section</h3>';
    var itemNum = 1;
    SECTIONS.forEach(function(sec) {
      html += '<div style="margin-bottom:10px;">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:4px;">' + esc(sec.title) + '</div>';
      sec.items.forEach(function(text) {

        html += '<span style="flex:1;padding-right:12px;">' + esc(text) + '</span>';
        html += '<span style="font-weight:700;width:30px;text-align:center;">' + (av || "\u2014") + '</span>';
        html += '</div>';
        itemNum++;
      });

    });

    if (res.comments) {
      html += '<h3 style="font-size:14px;margin:12px 0 6px;">Comments</h3>';
      html += '<p style="font-size:12.5px;color:var(--ink-2);background:var(--paper);padding:10px 12px;border-radius:8px;">' + esc(res.comments) + '</p>';
    }

    html += '<div style="display:flex;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--line);">';
    html += '<button class="btn btn-ghost btn-sm" onclick="closeDetailModal()" style="font-size:12px;">Close</button>';
