<style>
  :root {
    --ink: #16233D;
    --ink-2: #2E4066;
    --gold: #A9813E;
    --gold-soft: #D9C08F;
    --line: #C9D2E0;
    --paper: #EEF1F6;
    --surface: #FFFFFF;
    --muted: #5B6B85;
    --success: #3F7A5C;
    --error: #B3432E;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; }

  .login-wrap {
    max-width: 400px;
    margin: 80px auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 2px 4px rgba(22,35,61,0.04), 0 12px 32px -16px rgba(22,35,61,0.18);
    padding: 40px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .login-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--ink), var(--gold));
  }
  .login-wrap h1 { font-size: 22px; margin: 0 0 4px; }
  .login-wrap .sub { font-size: 13px; color: var(--muted); margin: 0 0 24px; }
  .login-wrap input {
    display: block;
    width: 100%;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    background: var(--surface);
  }
  .login-wrap input:focus { border-color: var(--ink-2); box-shadow: 0 0 0 3px rgba(22,35,61,0.08); }
  .login-wrap input::placeholder { color: var(--muted); }
  .login-wrap .err { color: var(--error); font-size: 12.5px; margin: -4px 0 14px; padding: 8px 10px; background: #FBEAE5; border: 1px solid #EAC3B8; border-radius: 6px; display: none; text-align: left; }
  .login-wrap button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    width: 100%;
    padding: 13px 20px;
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    text-align: center;
    transition: background 0.2s ease, transform 0.1s ease;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .login-wrap button:hover { background: var(--ink-2); }
  .login-wrap button:active { transform: scale(0.98); }
  .login-wrap button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .shell {
    max-width: 1100px;
    margin: 24px auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(22,35,61,0.04), 0 12px 32px -16px rgba(22,35,61,0.18);
    overflow: hidden;
    position: relative;
  }
  .shell::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--ink) 0%, var(--ink-2) 55%, var(--gold) 100%);
  }
  .masthead {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
  }
  .masthead h1 { font-size: 22px; margin: 0; }
  .masthead .sub { font-size: 13px; color: var(--muted); margin: 2px 0 0; }
  .masthead .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    all: unset;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.15s ease;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: var(--ink-2); }
  .btn-ghost { color: var(--ink-2); border: 1.5px solid var(--line); background: var(--surface); }
  .btn-ghost:hover { border-color: var(--ink-2); }
  .btn-danger { background: var(--error); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }

  .hamburger { display: none; }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    gap: 0;
    overflow-x: auto;
  }
  .tab {
    all: unset;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--ink); border-bottom-color: var(--gold); }

  .panel { display: none; padding: 28px 32px; }
  .panel.active { display: block; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-card .label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--ink); margin-top: 4px; }
  .stat-card .note { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  th {
    background: var(--paper);
    font-weight: 700;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-2);
    position: sticky;
    top: 0;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(22,35,61,0.02); }
  th input[type=checkbox], td input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--ink); }

  .mean-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 200px;
  }
  .mean-bar {
    flex: 1;
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .mean-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .mean-val {
    font-weight: 700;
    font-size: 13px;
    min-width: 32px;
    text-align: right;
  }

  .interp {
    display: inline-block;
    font-size: 11.5px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .interp.excellent { background: #E8F5E9; color: #2E7D32; }
  .interp.good { background: #E3F2FD; color: #1565C0; }
  .interp.fair { background: #FFF8E1; color: #F57F17; }
  .interp.poor { background: #FBEAE5; color: var(--error); }

  .section-heading {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin: 28px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold);
  }
  .section-heading:first-child { margin-top: 0; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--line);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .export-menu { position: relative; display: inline-block; }
  .export-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 8px 24px -8px rgba(22,35,61,0.2);
    z-index: 10;
    min-width: 160px;
  }
  .export-dropdown.show { display: block; }
  .export-dropdown button {
    all: unset;
    display: block;
    width: 100%;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
  }
  .export-dropdown button:hover { background: var(--paper); }

  /* filters */
  .filter-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .filter-group select, .filter-group input {
    padding: 7px 10px;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    background: var(--surface);
    color: var(--ink);
  }
  .filter-group select:focus, .filter-group input:focus { outline: 2px solid var(--ink-2); border-color: var(--ink-2); }
  .filter-count { font-size: 12px; color: var(--muted); padding: 7px 0; }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(22,35,61,0.06);
    position: relative;
    overflow: hidden;
  }
  .chart-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--ink), var(--gold));
    border-radius: 12px 12px 0 0;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .chart-card:hover::before { opacity: 1; }
  .chart-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin: 0;
    color: var(--ink);
  }
  .chart-card .chart-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--paper);
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .chart-card .chart-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin: 4px 0 0;
  }
  .chart-card canvas { width: 100% !important; }
  .chart-card-wide { grid-column: 1 / -1; }
  .chart-card-half canvas { max-height: 240px; }

  @media print {
    body { background: #fff; color: #000; }
    .shell { box-shadow: none; border: 1px solid #ccc; max-width: 100%; margin: 0; border-radius: 0; }
    .shell::before { display: none; }
    .tabs { display: none; }
    .filter-bar { display: none; }
    .masthead .actions { display: none; }
    .panel { display: block !important; padding: 20px; }
    .stat-card { break-inside: avoid; background: #f5f5f5; }
    .chart-card { break-inside: avoid; }
    .chart-grid { page-break-after: always; }
    canvas { max-width: 100% !important; }
  }

  /* Methodology */
  .method-box {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
    font-size: 13.5px;
    color: var(--ink-2);
  }
  .method-box p { margin: 0 0 8px; }
  .method-box p:last-child { margin-bottom: 0; }
  .method-formula {
    font-family: "Courier New", Courier, monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    padding: 14px;
    margin: 10px 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    letter-spacing: 0.04em;
  }
  .method-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 6px 0;
  }
  .method-table th, .method-table td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  .method-table th {
    background: var(--paper);
    font-weight: 700;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-2);
  }
  .method-table tr:last-child td { border-bottom: none; }
  .method-mono {
    font-family: SFMono-Regular, Menlo, Consolas, monospace;
    font-weight: 600;
    color: var(--ink);
  }
  .method-vars { width: auto; margin: 8px 0; }
  .method-vars td { padding: 4px 16px 4px 0; border: none; font-size: 13px; }
  .method-vars td:first-child { min-width: 50px; }
  .method-example {
    margin-top: 12px;
    padding: 10px 14px;
    background: #E8F0FE;
    border: 1px solid #C9D2E0;
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink-2);
  }

  .hamburger {
    all: unset;
    cursor: pointer;
    display: none;
    font-size: 22px;
    padding: 10px 14px;
    color: var(--ink-2);
    user-select: none;
    transition: transform 0.25s ease, color 0.2s ease;
  }
  .hamburger:hover { color: var(--ink); }
  .hamburger.open { transform: rotate(90deg); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(22,35,61,0.25);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .panel { padding: 16px 14px; }
    .masthead {
      padding: 16px 14px;
      flex-direction: column;
      align-items: flex-start;
    }
    .masthead h1 { font-size: 18px; }
    .masthead .sub { font-size: 12px; }
    .masthead .actions { width: 100%; justify-content: flex-start; }
    .hamburger { display: block; }
    .tabs { display: flex; padding: 0; overflow: hidden; flex-direction: column; border-bottom: none; position: relative; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.25s ease, border-bottom-width 0.3s ease; }
    .tabs.tabs-open { max-height: 500px; opacity: 1; position: absolute; left: 0; right: 0; z-index: 50; background: var(--surface); border-bottom: 2px solid var(--gold); box-shadow: 0 8px 24px -8px rgba(22,35,61,0.2); }
    .tab { padding: 12px 14px; font-size: 12px; border-bottom: 1px solid var(--line); transform-origin: top; transition: background 0.15s ease; }
    .tab:hover { background: rgba(22,35,61,0.04); }
    .tab.active { border-bottom-color: var(--gold); border-bottom-style: solid; border-bottom-width: 2px; }
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { padding: 12px 14px; }
    .stat-card .value { font-size: 22px; }
    .stat-card .label { font-size: 10.5px; }
    .chart-grid { grid-template-columns: 1fr; }
    .chart-card { padding: 14px; }
    .chart-card h3 { font-size: 12px; }
    .filter-bar { flex-direction: column; gap: 6px; padding: 10px; }
    .filter-group { width: 100%; }
    .filter-group label { font-size: 9.5px; }
    .filter-group select, .filter-group input { width: 100%; padding: 5px 7px; font-size: 11.5px; }
    .filter-count { font-size: 10.5px; padding: 4px 0; }
    #f-reset { font-size: 10.5px; padding: 4px 8px; }
    .section-heading { font-size: 14px; margin: 20px 0 10px; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
    .mean-bar-wrap { min-width: 120px; }
    .btn { font-size: 12px; padding: 6px 12px; }
    .login-wrap { margin: 40px 16px; padding: 28px 20px 24px; }
    .login-wrap h1 { font-size: 20px; }
    .login-wrap .sub { font-size: 12px; margin-bottom: 18px; }
    .login-wrap input { padding: 10px 12px; font-size: 14px; }
    .login-wrap button { padding: 12px 16px; font-size: 13px; }
    /* Methodology mobile */
    .method-box { padding: 12px; font-size: 12.5px; }
    .method-formula { font-size: 15px; padding: 10px; }
    .method-table { font-size: 11.5px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .method-table th, .method-table td { padding: 6px 8px; }
    .method-vars td { font-size: 12px; padding: 3px 10px 3px 0; }
    .method-example { font-size: 12px; padding: 8px 10px; }
  }

  @media (min-width: 641px) and (max-width: 900px) {
    .panel { padding: 24px 24px; }
    .masthead { padding: 24px 24px 18px; }
    .tabs { padding: 0 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 901px) and (max-width: 1200px) {
    .shell { max-width: 1000px; }
  }
</style>

<body>
<div id="admin-root"></div>
<script>
(function() {
  "use strict";

  var root = document.getElementById("admin-root");

  var STATE = {
    loggedIn: false,
    loading: true,
    loadError: null,
    responses: [],
    filteredResponses: [],
    activeTab: "overview",
    exportOpen: false,
    filters: (function() {
      try { return JSON.parse(sessionStorage.getItem("prism_filters")) || { userType: "all", dateFrom: "", dateTo: "", search: "" }; }
      catch(e) { return { userType: "all", dateFrom: "", dateTo: "", search: "" }; }
    })(),
    page: 1,
    pageSize: 25,
    selectedIds: {},
    charts: {}
  };

  var SECTIONS = [
    { key: "usability", title: "A. Usability", items: [
      "PRISM is easy to access and use for my school-related activities.",
      "The navigation system of PRISM is simple and easy to understand.",
      "The layout and interface design of PRISM are organized and easy to follow.",
      "The menus, buttons, and icons in PRISM are clearly labeled and easy to use.",
      "I can easily locate the information and features I need in PRISM.",
      "The information presented in PRISM is clear and understandable.",
      "I can learn how to use PRISM without requiring extensive assistance.",
      "PRISM is accessible and usable on the device I commonly use.",
      "I can complete my intended tasks in PRISM efficiently.",
      "Overall, PRISM provides a convenient and user-friendly experience."
    ]},
    { key: "func", title: "B. Functional Suitability", items: [
      "The features and functions of PRISM operate properly.",
      "PRISM provides the necessary functions needed for school management activities.",
      "PRISM allows authorized users to access school records and information efficiently.",
      "PRISM provides accurate and reliable school-related records and information.",
      "PRISM helps organize and manage student information effectively.",
      "PRISM supports teachers in managing academic activities such as attendance and grades.",
      "PRISM improves the distribution of school announcements and important information.",
      "PRISM's messaging and notification features support effective communication among users.",
      "PRISM provides convenient access to learning materials and academic resources.",
      "PRISM performs its intended functions effectively as a school management portal."
    ]},
    { key: "satisfaction", title: "C. User Satisfaction", items: [
      "I am satisfied with the information provided by PRISM for my school-related needs.",
      "I am satisfied with the relevance and usefulness of the information available in PRISM.",
      "I am satisfied with the accuracy of the records and information provided by PRISM.",
      "I am satisfied with how PRISM organizes and presents information.",
      "I am satisfied with the clarity and appearance of information displayed in PRISM.",
      "I am satisfied with how quickly PRISM provides updated information.",
      "I am satisfied with the timeliness of announcements, notifications, and updates provided by PRISM.",
      "I am satisfied with PRISM's ability to support my school-related activities.",
      "I am satisfied with the overall performance of PRISM.",
      "I am satisfied with PRISM as a portal for records, information, and school management."
    ]}
  ];

  var ITEM_MAP = {};
  var idx = 1;
  SECTIONS.forEach(function(sec) {
    sec.items.forEach(function(text) { ITEM_MAP[idx] = text; idx++; });
  });
  var TOTAL_ITEMS = idx - 1;

  var COLORS = [
    "#2E4066","#A9813E","#3F7A5C","#B3432E","#5B6B85",
    "#D9C08F","#1565C0","#F57F17","#7B1FA2","#00838F"
  ];

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  function interpret(mean) {
    if (mean >= 3.5) return { label: "Excellent", cls: "excellent" };
    if (mean >= 2.5) return { label: "Good", cls: "good" };
    if (mean >= 1.5) return { label: "Fair", cls: "fair" };
    return { label: "Poor", cls: "poor" };
  }

  function barColor(mean) {
    if (mean >= 3.5) return "var(--success)";
    if (mean >= 2.5) return "var(--ink-2)";
    if (mean >= 1.5) return "var(--gold)";
    return "var(--error)";
  }

  function mean(arr) {
    if (!arr.length) return 0;
    return arr.reduce(function(a, b) { return a + Number(b); }, 0) / arr.length;
  }

  function calcSectionMean(responses, section, itemStartNum) {
    var vals = [];
    responses.forEach(function(r) {
      section.items.forEach(function(_, i) {
        var v = (r.answers || {})[String(itemStartNum + i)];
        if (v) vals.push(v);
      });
    });
    return mean(vals);
  }

  function calcItemMean(responses, itemNum) {
    var vals = [];
    responses.forEach(function(r) {
      var v = (r.answers || {})[String(itemNum)];
      if (v) vals.push(v);
    });
    return mean(vals);
  }

  /* ---- Statistics helpers ---- */
  function stdDev(arr) {
    if (arr.length < 2) return 0;
    var m = mean(arr);
    var sumSq = arr.reduce(function(s, v) { return s + Math.pow(v - m, 2); }, 0);
    return Math.sqrt(sumSq / (arr.length - 1));
  }

  function freqCount(arr) {
    var counts = { 4: 0, 3: 0, 2: 0, 1: 0 };
    arr.forEach(function(v) { if (counts[v] !== undefined) counts[v]++; });
    return counts;
  }

  function itemValues(responses, itemNum) {
    var vals = [];
    responses.forEach(function(r) {
      var v = (r.answers || {})[String(itemNum)];
      if (v) vals.push(v);
    });
    return vals;
  }

  function sectionValues(responses, section, itemStartNum) {
    var vals = [];
    responses.forEach(function(r) {
      section.items.forEach(function(_, i) {
        var v = (r.answers || {})[String(itemStartNum + i)];
        if (v) vals.push(v);
      });
    });
    return vals;
  }

  function cronbachAlpha(responses) {
    var n = TOTAL_ITEMS;
    if (n < 2 || responses.length < 2) return null;
    var itemVariances = [];
    var allScores = [];
    for (var i = 0; i < responses.length; i++) {
      allScores.push(0);
      for (var k = 1; k <= n; k++) {
        var v = (responses[i].answers || {})[String(k)];
        if (v) allScores[i] += v;
      }
    }
    var totalVar = Math.pow(stdDev(allScores), 2);
    for (var k2 = 1; k2 <= n; k2++) {
      var iv = itemValues(responses, k2);
      itemVariances.push(Math.pow(stdDev(iv), 2));
    }
    var sumItemVar = itemVariances.reduce(function(a, b) { return a + b; }, 0);
    if (totalVar === 0) return null;
    return (n / (n - 1)) * (1 - sumItemVar / totalVar);
  }

  function cronbachAlphaSection(responses, section, itemStartNum) {
    var n = section.items.length;
    if (n < 2 || responses.length < 2) return null;
    var itemVariances = [];
    var allScores = [];
    for (var i = 0; i < responses.length; i++) {
      allScores.push(0);
      section.items.forEach(function(_, j) {
        var v = (responses[i].answers || {})[String(itemStartNum + j)];
        if (v) allScores[i] += v;
      });
    }
    var totalVar = Math.pow(stdDev(allScores), 2);
    section.items.forEach(function(_, j) {
      var vals = [];
      responses.forEach(function(r) {
        var v = (r.answers || {})[String(itemStartNum + j)];
        if (v) vals.push(v);
      });
      itemVariances.push(Math.pow(stdDev(vals), 2));
    });
    var sumItemVar = itemVariances.reduce(function(a, b) { return a + b; }, 0);
    if (totalVar === 0) return null;
    return (n / (n - 1)) * (1 - sumItemVar / totalVar);
  }

  function alphaLabel(a) {
    if (a === null || a === undefined) return "";
    if (a >= 0.9) return "Excellent";
    if (a >= 0.8) return "Good";
    if (a >= 0.7) return "Acceptable";
    if (a >= 0.6) return "Questionable";
    return "Poor";
  }

  function pearsonCorr(x, y) {
    if (x.length < 2 || y.length < 2 || x.length !== y.length) return null;
    var n = x.length;
    var mx = mean(x), my = mean(y);
    var num = 0, dx2 = 0, dy2 = 0;
    for (var i = 0; i < n; i++) {
      var dx = x[i] - mx;
      var dy = y[i] - my;
      num += dx * dy;
      dx2 += dx * dx;
      dy2 += dy * dy;
    }
    var denom = Math.sqrt(dx2 * dy2);
    return denom === 0 ? 0 : num / denom;
  }

  function tTestIndependent(g1, g2) {
    if (g1.length < 2 || g2.length < 2) return null;
    var m1 = mean(g1), m2 = mean(g2);
    var v1 = Math.pow(stdDev(g1), 2), v2 = Math.pow(stdDev(g2), 2);
    var n1 = g1.length, n2 = g2.length;
    var se = Math.sqrt(v1/n1 + v2/n2);
    if (se === 0) return null;
    var t = (m1 - m2) / se;
    var num = v1/n1 + v2/n2;
    var df = Math.pow(num, 2) / (Math.pow(v1/n1, 2)/(n1-1) + Math.pow(v2/n2, 2)/(n2-1));
    var p = 2 * (1 - tCDF(Math.abs(t), df));
    return { t: t, df: df, p: p, mean1: m1, mean2: m2 };
  }

  function tCDF(t, df) {
    var x = df / (df + t * t);
    var a = df / 2, b = 0.5;
    var bt = Math.exp(lgamma(a + b) - lgamma(a) - lgamma(b) + a * Math.log(x) + b * Math.log(1 - x));
    var ib = bt / a;
    var result = 1 - 0.5 * ib;
    return Math.max(0, Math.min(1, result));
  }

  function lgamma(x) {
    var c = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5];
    var y = x, tmp = x + 5.5;
    tmp -= (x + 0.5) * Math.log(tmp);
    var ser = 1.000000000190015;
    for (var j = 0; j < 6; j++) ser += c[j] / ++y;
    return -tmp + Math.log(2.5066282746310005 * ser / x);
  }

  /* filters */
  function saveFilters() {
    try { sessionStorage.setItem("prism_filters", JSON.stringify(STATE.filters)); } catch(e) {}
  }

  function applyFilters() {
    var r = STATE.responses;
    var f = STATE.filters;
    if (f.userType !== "all") {
      r = r.filter(function(res) { return res.respondent_user_type === f.userType; });
    }
    if (f.dateFrom) {
      var from = new Date(f.dateFrom + "T00:00:00Z");
      r = r.filter(function(res) { return new Date(res.submitted_at) >= from; });
    }
    if (f.dateTo) {
      var to = new Date(f.dateTo + "T23:59:59.999Z");
      r = r.filter(function(res) { return new Date(res.submitted_at) <= to; });
    }
    if (f.search) {
      var q = f.search.toLowerCase();
      r = r.filter(function(res) {
        return (res.respondent_name || "").toLowerCase().indexOf(q) !== -1 ||
               (res.respondent_user_type || "").toLowerCase().indexOf(q) !== -1 ||
               (res.comments || "").toLowerCase().indexOf(q) !== -1 ||
               (res.id || "").toLowerCase().indexOf(q) !== -1 ||
               (res.respondent_sex || "").toLowerCase().indexOf(q) !== -1;
      });
    }
    STATE.page = 1;
    STATE.filteredResponses = r;
    saveFilters();
  }

              backgroundColor: "rgba(22,35,61,0.9)",
              titleFont: { size: 12, weight: "700" },

              padding: 10,
              cornerRadius: 8,
              callbacks: {
                label: function(ctx) {
                  var total = ctx.dataset.data.reduce(function(a,b){return a+b;},0);

        type: "doughnut",

          labels: Object.keys(sexCounts),
          datasets: [{

            borderWidth: 3,
            hoverOffset: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          cutout: "55%",
          plugins: {
            legend: { position: "bottom", labels: { boxWidth: 12, padding: 14, font: { size: 11 } } },
            tooltip: {
              backgroundColor: "rgba(22,35,61,0.9)",
              titleFont: { size: 12, weight: "700" },
              bodyFont: { size: 12 },
              padding: 10,
              cornerRadius: 8,
              callbacks: {
                label: function(ctx) {
                  var total = ctx.dataset.data.reduce(function(a,b){return a+b;},0);
                  var pct = ((ctx.raw / total) * 100).toFixed(1);
                  return ctx.label + ": " + ctx.raw + " (" + pct + "%)";
                }
              }
            }
          }
        }
      });
