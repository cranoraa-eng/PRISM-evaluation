  function closeDetailModal() {
    var overlay = document.getElementById("detail-modal-overlay");
    if (overlay) overlay.style.display = "none";
    STATE.detailResponse = null;
  }
  window.closeDetailModal = closeDetailModal;

  function loadResponses() {
    STATE.loading = true;
    render();
    supabaseClient.from("responses").select("*").order("submitted_at", { ascending: false }).then(function(res) {
      if (res.error) {
        STATE.loadError = res.error.message;
        STATE.loading = false;
        render();
        return;
      }
      STATE.responses = res.data || [];
      STATE.loading = false;
      STATE.loadError = null;
      STATE.chatContextDirty = true;
      applyFilters();
      render();
      if (STATE.filteredResponses.length && STATE.activeTab === "charts") initCharts(STATE.filteredResponses);
    });
  }

  function showToast(msg) {
    var el = document.getElementById("toast");
    if (!el) return;
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(el._hide);
    el._hide = setTimeout(function() { el.classList.remove("show"); }, 2500);
  }

  var IDLE_TIMEOUT_MS = 15 * 60 * 1000; /* 15 minutes */

  function resetIdleTimer() {
    if (STATE.idleTimer) clearTimeout(STATE.idleTimer);
    if (STATE.loggedIn) {
      STATE.idleTimer = setTimeout(function() {
        supabaseClient.auth.signOut();
        STATE.loggedIn = false;
        sessionStorage.removeItem("prism_admin");
        render();
      }, IDLE_TIMEOUT_MS);
    }
  }

  function attachLoginHandlers() {
    var btn = document.getElementById("login-btn");
    var email = document.getElementById("login-email");
    var pass = document.getElementById("login-pass");
    var err = document.getElementById("login-err");
    var originalText = btn ? btn.textContent : "";
    function doLogin() {
      if (!email.value || !pass.value) { err.textContent = "Please enter both email and password."; err.style.display = "block"; return; }
      if (btn) { btn.textContent = "Signing in\u2026"; btn.disabled = true; }
      supabaseClient.auth.signInWithPassword({ email: email.value, password: pass.value }).then(function(res) {
        if (res.error) {
          err.textContent = res.error.message === "Invalid login credentials" ? "Invalid email or password." : res.error.message;
          err.style.display = "block";
          if (btn) { btn.textContent = originalText; btn.disabled = false; }
          return;
        }
        /* Check admin role */
        supabaseClient.from("admin_roles").select("role").eq("user_id", res.data.user.id).maybeSingle().then(function(roleRes) {
          STATE.userRole = roleRes.data ? roleRes.data.role : "viewer";
          STATE.userId = res.data.user.id;
          STATE.userEmail = res.data.user.email;
          STATE.loggedIn = true;
          sessionStorage.setItem("prism_admin", "1");
          loadChatMessages();
          resetIdleTimer();
          loadResponses();
        });
      });
    }
    if (btn) btn.addEventListener("click", doLogin);
    if (pass) pass.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
    if (email) email.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
  }

  function attachDashboardHandlers() {
    var hamburger = document.getElementById("hamburger-btn");
    if (hamburger) hamburger.addEventListener("click", function(e) {
      e.preventDefault();
      document.querySelector(".tabs").classList.toggle("tabs-open");
      hamburger.classList.toggle("open");
    });

    document.querySelectorAll(".tab").forEach(function(t) {
      t.addEventListener("click", function() {
        STATE.savedPages[STATE.activeTab] = STATE.page;
        STATE.activeTab = t.getAttribute("data-tab");
        STATE.page = STATE.savedPages[STATE.activeTab] || 1;
        render();
        if (STATE.activeTab === "charts" && STATE.filteredResponses.length) initCharts(STATE.filteredResponses);
      });
    });

    var refreshBtn = document.getElementById("refresh-btn");
    if (refreshBtn) refreshBtn.addEventListener("click", function() { loadResponses(); });

    var logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.addEventListener("click", function() {
      supabaseClient.auth.signOut();
      STATE.loggedIn = false;
      sessionStorage.removeItem("prism_admin");
      if (STATE.idleTimer) clearTimeout(STATE.idleTimer);
      render();
    });

    var exportToggle = document.getElementById("export-toggle");
    var exportDropdown = document.getElementById("export-dropdown");
    if (exportToggle && exportDropdown) {
      exportToggle.addEventListener("click", function() {
        var show = !exportDropdown.classList.contains("show");
        exportDropdown.classList.toggle("show");
        exportToggle.setAttribute("aria-expanded", String(show));
      });
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && exportDropdown.classList.contains("show")) {
          exportDropdown.classList.remove("show");
          exportToggle.setAttribute("aria-expanded", "false");
          exportToggle.focus();
        }
      });
      document.addEventListener("click", function(e) {
        if (!exportToggle.contains(e.target) && !exportDropdown.contains(e.target)) {
          exportDropdown.classList.remove("show");
          exportToggle.setAttribute("aria-expanded", "false");
        }
      });
    }
    var exportCsv = document.getElementById("export-csv");
    if (exportCsv) exportCsv.addEventListener("click", function() { exportCSV(); });
    var exportJson = document.getElementById("export-json");
    if (exportJson) exportJson.addEventListener("click", function() { exportJSON(); });
    var exportExcel = document.getElementById("export-excel");
    if (exportExcel) exportExcel.addEventListener("click", function() { exportExcelFile(); });
    var exportSpss = document.getElementById("export-spss");
    if (exportSpss) exportSpss.addEventListener("click", function() { exportSPSS(); });

    var fType = document.getElementById("f-type");
    var fFrom = document.getElementById("f-from");
    var fTo = document.getElementById("f-to");
    var fSearch = document.getElementById("f-search");
    var fReset = document.getElementById("f-reset");
    function reinitCharts() { if (STATE.activeTab === "charts" && STATE.filteredResponses.length) initCharts(STATE.filteredResponses); }
    if (fType) fType.addEventListener("change", function() { STATE.filters.userType = fType.value; applyFilters(); render(); reinitCharts(); });
    if (fFrom) fFrom.addEventListener("change", function() { STATE.filters.dateFrom = fFrom.value; applyFilters(); render(); reinitCharts(); });
    if (fTo) fTo.addEventListener("change", function() { STATE.filters.dateTo = fTo.value; applyFilters(); render(); reinitCharts(); });
    if (fSearch) fSearch.addEventListener("input", function() { STATE.filters.search = fSearch.value; applyFilters(); render(); reinitCharts(); });
    if (fReset) fReset.addEventListener("click", function() { STATE.filters = { userType: "all", dateFrom: "", dateTo: "", search: "" }; applyFilters(); render(); reinitCharts(); });

    document.querySelectorAll(".sort-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var col = btn.getAttribute("data-sort");
        if (SORT.col === col) SORT.dir *= -1;
        else { SORT.col = col; SORT.dir = -1; }
        render();
      });
    });

    /* pagination */
    var pagePrev = document.getElementById("page-prev");
    var pageNext = document.getElementById("page-next");
    if (pagePrev) pagePrev.addEventListener("click", function() { if (STATE.page > 1) { STATE.page--; render(); } });
    if (pageNext) pageNext.addEventListener("click", function() {
      var totalPages = Math.ceil(STATE.filteredResponses.length / STATE.pageSize);
      if (STATE.page < totalPages) { STATE.page++; render(); }
    });

    /* bulk select */
    var selectAll = document.getElementById("select-all");
    if (selectAll) selectAll.addEventListener("change", function() {
      var pageData = getPageData();
      STATE.selectedIds = {};
      if (selectAll.checked) pageData.forEach(function(r) { STATE.selectedIds[r.id] = true; });
      render();
    });

    var bulkDeleteBtn = document.getElementById("bulk-delete-btn");
    if (bulkDeleteBtn) bulkDeleteBtn.addEventListener("click", function() { bulkDelete(); });

    /* row select handler */
    document.querySelectorAll(".row-select").forEach(function(cb) {
      cb.addEventListener("change", function() {
        var id = cb.getAttribute("data-id");
        if (cb.checked) STATE.selectedIds[id] = true;
        else delete STATE.selectedIds[id];
      });
    });

    /* response detail modal on row click */
    document.querySelectorAll(".resp-row").forEach(function(row) {
      row.addEventListener("click", function(e) {
        if (e.target.closest("input, button, a")) return;
        var id = row.getAttribute("data-id");
        var res = STATE.responses.find(function(r) { return r.id === id; });
        if (res) { STATE.detailResponse = res; render(); }
      });
    });

    /* Idle timeout reset on user activity */
    function resetIdleActivity() { resetIdleTimer(); }
    document.addEventListener("click", resetIdleActivity);
    document.addEventListener("keydown", resetIdleActivity);
    document.addEventListener("mousemove", resetIdleActivity);
    document.addEventListener("scroll", resetIdleActivity);

    /* chart download */
    document.querySelectorAll(".chart-download-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var canvasId = btn.getAttribute("data-canvas");
        var canvas = document.getElementById(canvasId);
        if (!canvas) return;
        var format = btn.getAttribute("data-format") || "png";
        var link = document.createElement("a");
        link.download = canvasId + "." + format;
        if (format === "svg") {
          var svg = canvas.parentNode.querySelector("svg");
          if (svg) {
            var svgData = new XMLSerializer().serializeToString(svg);
            link.href = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgData);
          } else {
            link.href = canvas.toDataURL("image/png");
            link.download = canvasId + ".png";
          }
        } else {
          link.href = canvas.toDataURL("image/png");
        }
        link.click();
        showToast("Chart saved as " + link.download);
      });
    });
  }

  function getPageData() {
    var r = STATE.filteredResponses;
    var start = (STATE.page - 1) * STATE.pageSize;
    return r.slice(start, start + STATE.pageSize);
  }

  async function bulkDelete() {
    var ids = Object.keys(STATE.selectedIds);
    if (!ids.length) { showToast("No responses selected."); return; }
    if (STATE.userRole === "viewer") { showToast("Viewers cannot delete responses."); return; }
    if (!confirm("Delete " + ids.length + " selected response(s)? This action cannot be undone.")) return;
    try {
      var { error: updErr } = await supabaseClient.from("responses").update({ deleted_at: new Date().toISOString() }).in("id", ids);
      if (updErr) throw updErr;
      STATE.selectedIds = {};
      showToast("Deleted " + ids.length + " response(s).");
      loadResponses();
    } catch (err) {
      console.error("Bulk delete error:", err);
      showToast("Delete failed: " + (err.message || "Unknown error"));
    }
  }

  function exportCSV() {
    var r = STATE.filteredResponses;
    if (!r.length) return;
    var headers = ["Reference","Submitted","Name","Age","Sex","User Type","Consent"];
    for (var k = 1; k <= TOTAL_ITEMS; k++) headers.push("Q" + k);
    headers.push("Mean","Comments");
    var rows = [headers.join(",")];
    r.forEach(function(res) {
      var vals = [];
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        vals.push(v || "");
      }
      var m = mean(vals);
      var ref = res.id ? res.id.slice(0, 8).toUpperCase() : "";
      var dt = res.submitted_at || "";
      var line = [ref, dt, res.respondent_name || "", res.respondent_age || "", res.respondent_sex || "", res.respondent_user_type || "", res.consent_given ? "Yes" : "No"]
        .concat(vals).concat([m.toFixed(2), res.comments || ""]);
      rows.push(line.map(function(c) { return '"' + String(c).replace(/"/g, '""').replace(/^[=+\-@\t\r]/, "'") + '"'; }).join(","));
    });
    var blob = new Blob([rows.join("\n")], { type: "text/csv" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "prism_responses_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
    showToast("CSV exported (" + r.length + " responses)");
  }

  function exportJSON() {
    var r = STATE.filteredResponses;
    if (!r.length) return;
    var blob = new Blob([JSON.stringify(r, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "prism_responses_" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
    showToast("JSON exported (" + r.length + " responses)");
  }

  function exportSPSS() {
    var r = STATE.filteredResponses;
    if (!r.length) { showToast("No data to export."); return; }
    var lines = [];
    lines.push("* SPSS Syntax for PRISM Evaluation Data");
    lines.push("* Generated " + new Date().toISOString().slice(0,10));
    lines.push("");
    lines.push("DATA LIST FILE=\"prism_data.csv\" FREE (");
    lines.push("  /ID (A8)");
    lines.push("  Submitted (ADATE10)");
    lines.push("  Name (A50)");
    lines.push("  Age (F3)");
    lines.push("  Sex (A20)");
    lines.push("  UserType (A50)");
    lines.push("  Consent (F1)");
    for (var q = 1; q <= TOTAL_ITEMS; q++) {
      lines.push("  Q" + q + " (F1)");
    }
    lines.push("  Mean (F4.2)");
    lines.push("  Comments (A500).");
    lines.push("");
    lines.push("VARIABLE LABELS");
    lines.push("  ID \"Response ID\"");
    lines.push("  Submitted \"Submission Date\"");
    lines.push("  Name \"Respondent Name\"");
    for (var qi = 1; qi <= TOTAL_ITEMS; qi++) {
      lines.push("  Q" + qi + " \"Item " + qi + "\"");
    }
    lines.push("  Mean \"Overall Mean\".");
    lines.push("");
    lines.push("VALUE LABELS");
    for (var q2 = 1; q2 <= TOTAL_ITEMS; q2++) {
      lines.push("  Q" + q2);
    }
    lines.push("  1 \"Strongly Disagree\"");
    lines.push("  2 \"Disagree\"");
    lines.push("  3 \"Agree\"");
    lines.push("  4 \"Strongly Agree\".");
    lines.push("");
    lines.push("VARIABLE LEVEL Q1 TO Q" + TOTAL_ITEMS + " (ORDINAL).");
    lines.push("");
    lines.push("DESCRIPTIVES VARIABLES=Q1 TO Q" + TOTAL_ITEMS + " Mean /STATISTICS=MEAN STDDEV MIN MAX.");
    lines.push("");
    lines.push("RELIABILITY /VARIABLES=Q1 TO Q" + TOTAL_ITEMS + " /SCALE(PRISM) ALL /MODEL=ALPHA /SUMMARY=TOTAL.");
    lines.push("");
    lines.push("CORRELATIONS /VARIABLES=Q1 TO Q" + TOTAL_ITEMS + " /STATISTICS DESCRIPTIVES.");
    var blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "prism_syntax_" + new Date().toISOString().slice(0,10) + ".sps";
    a.click();
    URL.revokeObjectURL(url);
    showToast("SPSS syntax exported (" + r.length + " responses)");
  }

  function exportExcelFile() {
    var r = STATE.filteredResponses;
    if (!r.length) return;
    
    console.log("Starting Excel export with", r.length, "responses");

    var now = new Date();
    var exportedOn = now.toLocaleString("en-US", {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
    var BORDER = {
      top: { style: "thin", color: { rgb: "D8E0EC" } },
      bottom: { style: "thin", color: { rgb: "D8E0EC" } },
      left: { style: "thin", color: { rgb: "D8E0EC" } },
      right: { style: "thin", color: { rgb: "D8E0EC" } }
    };

    var BORDER_WHITE = {
      top: { style: "thin", color: { rgb: "FFFFFF" } },
      bottom: { style: "thin", color: { rgb: "FFFFFF" } },
      left: { style: "thin", color: { rgb: "FFFFFF" } },
      right: { style: "thin", color: { rgb: "FFFFFF" } }
    };

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function meanColor(v) {
      if (v >= 3.5) return "2E7D32"; /* Dark green for excellent */
      if (v >= 2.5) return "1565C0"; /* Dark blue for good */
      if (v >= 1.5) return "F57F17"; /* Dark amber for fair */
      return "C62828"; /* Dark red for poor */
    }

    function meanFill(v) {
      if (v >= 3.5) return "E8F5E9"; /* Light green for excellent */
      if (v >= 2.5) return "E3F2FD"; /* Light blue for good */
      if (v >= 1.5) return "FFF8E1"; /* Light amber for fair */
      return "FFEBEE"; /* Light red for poor */
    }

    function baseCellStyle(opts) {
      var style = {
        font: { name: "Segoe UI", sz: 10, color: { rgb: "16233D" } },
        border: clone(BORDER),
        alignment: { vertical: "center" }
      };
      if (opts && opts.center) style.alignment.horizontal = "center";
      if (opts && opts.right) style.alignment.horizontal = "right";
      if (opts && opts.wrap) style.alignment.wrapText = true;
      if (opts && opts.bold) style.font.bold = true;
      if (opts && opts.fill) style.fill = { fgColor: { rgb: opts.fill } };
      if (opts && opts.fontColor) style.font.color = { rgb: opts.fontColor };
      if (opts && opts.numFmt) style.numFmt = opts.numFmt;
      if (opts && opts.sz) style.font.sz = opts.sz;
      return style;
    }

    var SECTION_FILL = "2E4066";
    var SECTION_FONT = "FFFFFF";
    var GOLD_FILL = "A9813E";
    var ACCENT_FILL = "5B7C99";
    var LIGHT_GOLD = "F5ECD7";
    var ROW_EVEN = "F8FAFB";
    var ROW_ODD = "FFFFFF";
    var EXCELLENT_FILL = "E8F5E9";
    var GOOD_FILL = "E3F2FD";
    var FAIR_FILL = "FFF8E1";
    var POOR_FILL = "FBEAE5";

    function setStyle(ws, rowIdx, colIdx, style) {
      var addr = XLSX.utils.encode_cell({ r: rowIdx, c: colIdx });
      if (!ws[addr]) {
        ws[addr] = { t: "s", v: "" };
      }
      ws[addr].s = style;
    }

    function buildRowHeights(rows, wrapHints) {
      var out = [];
      out[0] = { hpx: 36 }; /* Title row - increased height */
      out[1] = { hpx: 26 }; /* Subtitle row - increased height */
      out[2] = { hpx: 8 };  /* Spacer */
      out[3] = { hpx: 8 };  /* Spacer */
      out[4] = { hpx: 28 }; /* Header row - increased height */
      for (var ri = 5; ri < rows.length; ri++) {
        var maxLines = 1;
        Object.keys(wrapHints || {}).forEach(function(key) {
          var ci = Number(key);
          var limit = wrapHints[key];
          var val = rows[ri][ci];
          if (val == null || val === "") return;
          String(val).split(/\r?\n/).forEach(function(line) {
            maxLines = Math.max(maxLines, Math.ceil(line.length / limit) || 1);
          });
        });
        out[ri] = { hpx: Math.min(20 * maxLines + 8, 120) }; /* Increased base height */
      }
      return out;
    }

    function createSheet(title, headers, bodyRows, config) {
      var subtitle = "Generated " + exportedOn + " | Responses: " + r.length;
      var rows = [
        ["PRISM Research Dashboard"],
        [title + " | " + subtitle],
        [""],
        [""],
        headers
      ].concat(bodyRows);
      var lastCol = headers.length - 1;
      var ws = XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"] = config.widths;
      ws["!rows"] = buildRowHeights(rows, config.wrapHints);
      ws["!merges"] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: lastCol } },
        { s: { r: 1, c: 0 }, e: { r: 1, c: lastCol } }
      ];
      ws["!freeze"] = { xSplit: 0, ySplit: 5 };
      ws["!autofilter"] = { ref: XLSX.utils.encode_range({ s: { r: 4, c: 0 }, e: { r: 4, c: lastCol } }) };

      /* Enhanced title styling with gradient-like feel */
      setStyle(ws, 0, 0, {
        font: { name: "Segoe UI", sz: 18, bold: true, color: { rgb: "16233D" } },
        alignment: { vertical: "center", horizontal: "left" },
        fill: { fgColor: { rgb: "F5ECD7" } },
        border: {
          bottom: { style: "thick", color: { rgb: "A9813E" } }
        }
      });
      setStyle(ws, 1, 0, {
        font: { name: "Segoe UI", sz: 10, italic: true, color: { rgb: "5B6B85" } },
        alignment: { vertical: "center", horizontal: "left", wrapText: true },
        fill: { fgColor: { rgb: "F8FAFB" } }
      });

      /* Enhanced header styling with rounded corners effect */
      for (var hc = 0; hc <= lastCol; hc++) {
        setStyle(ws, 4, hc, {
          font: { name: "Segoe UI", sz: 11, bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "2E4066" } },
          border: {
            top: { style: "medium", color: { rgb: "16233D" } },
            bottom: { style: "medium", color: { rgb: "16233D" } },
            left: { style: "thin", color: { rgb: "5B7C99" } },
            right: { style: "thin", color: { rgb: "5B7C99" } }
          },
          alignment: { vertical: "center", horizontal: "center", wrapText: true }
        });
      }

      var sectionRowsMap = {};
      if (config.sectionRows) {
        config.sectionRows.forEach(function(sr) { sectionRowsMap[sr] = true; });
      }
      var subSectionRowsMap = {};
      if (config.subSectionRows) {
        config.subSectionRows.forEach(function(sr) { subSectionRowsMap[sr] = true; });
      }

      for (var br = 5; br < rows.length; br++) {
        var isSection = sectionRowsMap[br];
        var isSubSection = subSectionRowsMap[br];
        var isEven = br % 2 === 0;

        for (var bc = 0; bc <= lastCol; bc++) {
          var val = rows[br][bc];
          var isBlank = val == null || val === "";
          if (isBlank && !(config.forceStyleCols || {})[bc]) continue;

          if (isSection) {
            setStyle(ws, br, bc, baseCellStyle({
              bold: true, fill: SECTION_FILL, fontColor: SECTION_FONT,
              sz: 12, wrap: true
            }));
            continue;
          }

          if (isSubSection) {
            setStyle(ws, br, bc, baseCellStyle({
              bold: true, fill: GOLD_FILL, fontColor: "FFFFFF",
              sz: 11, wrap: true
            }));
            continue;
          }

          var rowFill = isEven ? ROW_EVEN : ROW_ODD;
          var style;

          if ((config.wrapCols || {})[bc]) {
            style = baseCellStyle({ wrap: true, fill: rowFill });
          } else if ((config.centerCols || {})[bc]) {
            style = baseCellStyle({ center: true, fill: rowFill });
          } else {
            style = baseCellStyle({ fill: rowFill });
          }

          /* Add subtle borders to all data cells */
          style.border = {
            top: { style: "thin", color: { rgb: "E0E0E0" } },
            bottom: { style: "thin", color: { rgb: "E0E0E0" } },
            left: { style: "thin", color: { rgb: "E0E0E0" } },
            right: { style: "thin", color: { rgb: "E0E0E0" } }
          };

          if ((config.boldCols || {})[bc]) {
            style.font.bold = true;
            style.font.color = { rgb: "16233D" };
          }

          if (config.percentCols && config.percentCols[bc]) {
            style.alignment.horizontal = "center";
            style.numFmt = "0.0%";
          }

          if ((config.numericCols || {})[bc]) {
            style.alignment.horizontal = "center";
            style.numFmt = config.numericCols[bc];
          }

          if (config.meanCol === bc && typeof val === "number") {
            style = baseCellStyle({
              center: true, bold: true, sz: 11,
              numFmt: "0.00",
              fill: meanFill(val),
              fontColor: meanColor(val)
            });
            /* Enhanced border for mean columns */
            style.border = {
              top: { style: "medium", color: { rgb: "A9813E" } },
              bottom: { style: "medium", color: { rgb: "A9813E" } },
              left: { style: "medium", color: { rgb: "A9813E" } },
              right: { style: "medium", color: { rgb: "A9813E" } }
            };
          }

          setStyle(ws, br, bc, style);
        }
      }

      return ws;
    }

    /* ---- Sheet 1: All Responses ---- */
    var hdrs = ["Reference","Submitted","Name","Age","Sex","User Type","Consent"];
    for (var q = 1; q <= TOTAL_ITEMS; q++) hdrs.push("Q" + q);
    hdrs.push("Mean","Interpretation","Comments");
    var rows1 = [];
    r.forEach(function(res) {
      var vals = [];
      for (var q2 = 1; q2 <= TOTAL_ITEMS; q2++) vals.push((res.answers || {})[String(q2)] || "");
      var m = mean(vals);
      var interp = interpret(m);
      rows1.push([
        res.id ? res.id.slice(0, 8).toUpperCase() : "",
        res.submitted_at ? new Date(res.submitted_at).toLocaleString("en-US", {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }) : "",
        res.respondent_name || "",
        res.respondent_age || "",
        res.respondent_sex || "",
        res.respondent_user_type || "",
        res.consent_given ? "Yes" : "No"
      ].concat(vals).concat([+m.toFixed(2), interp.label, res.comments || ""]));
    });
    var widths1 = [
      { wch: 13 }, { wch: 22 }, { wch: 22 }, { wch: 8 }, { wch: 12 }, { wch: 15 }, { wch: 9 }
    ];
    for (var qc = 1; qc <= TOTAL_ITEMS; qc++) widths1.push({ wch: 6 });
    widths1.push({ wch: 11 }, { wch: 20 }, { wch: 45 });
    var centerCols1 = { 0: true, 1: true, 3: true, 4: true, 6: true };
    for (var ci = 7; ci < 7 + TOTAL_ITEMS; ci++) centerCols1[ci] = true;
    centerCols1[7 + TOTAL_ITEMS] = true;
    var wrapCols1 = { 2: true, 5: true };
    wrapCols1[9 + TOTAL_ITEMS] = true;
    var wrapHints1 = { 2: 18, 5: 14 };
    wrapHints1[9 + TOTAL_ITEMS] = 36;
    var ws1 = createSheet("All Responses", hdrs, rows1, {
      widths: widths1,
      centerCols: centerCols1,
      wrapCols: wrapCols1,
      wrapHints: wrapHints1,
      meanCol: 7 + TOTAL_ITEMS
    });
    for (var rowIdx1 = 0; rowIdx1 < rows1.length; rowIdx1++) {
      var sheetRowIdx = rowIdx1 + 5;
      var excelRowNum = sheetRowIdx + 1;
      var meanCellAddr = XLSX.utils.encode_cell({ r: sheetRowIdx, c: 7 + TOTAL_ITEMS });
      var startQAddr = XLSX.utils.encode_cell({ r: sheetRowIdx, c: 7 }).replace(/\d+$/, "");
      var endQAddr = XLSX.utils.encode_cell({ r: sheetRowIdx, c: 7 + TOTAL_ITEMS - 1 }).replace(/\d+$/, "");
      if (ws1[meanCellAddr]) {
        ws1[meanCellAddr].f = "AVERAGE(" + startQAddr + excelRowNum + ":" + endQAddr + excelRowNum + ")";
        ws1[meanCellAddr].v = rows1[rowIdx1][7 + TOTAL_ITEMS];
        ws1[meanCellAddr].t = "n";
        ws1[meanCellAddr].z = "0.00";
      }
      /* Style the interpretation cell with color coding */
      var interpCellAddr = XLSX.utils.encode_cell({ r: sheetRowIdx, c: 8 + TOTAL_ITEMS });
      var meanVal = rows1[rowIdx1][7 + TOTAL_ITEMS];
      if (ws1[interpCellAddr]) {
        var interpStyle = baseCellStyle({
          center: true, bold: true, sz: 10,
          fill: meanFill(meanVal),
          fontColor: meanColor(meanVal)
        });
        interpStyle.border = {
          top: { style: "thin", color: { rgb: "E0E0E0" } },
          bottom: { style: "thin", color: { rgb: "E0E0E0" } },
          left: { style: "medium", color: { rgb: "A9813E" } },
          right: { style: "thin", color: { rgb: "E0E0E0" } }
        };
        ws1[interpCellAddr].s = interpStyle;
      }
    }

    /* ---- Sheet 2: Section Means ---- */
    var rows2 = [];
    var itemNum = 1;
    SECTIONS.forEach(function(sec) {
      var m = calcSectionMean(r, sec, itemNum);
      rows2.push([sec.title, sec.items.length, +m.toFixed(2), interpret(m).label]);
      itemNum += sec.items.length;
    });
    var ws2 = createSheet("Section Means", ["Section", "Items", "Mean", "Interpretation"], rows2, {
      widths: [{ wch: 38 }, { wch: 11 }, { wch: 12 }, { wch: 20 }],
      centerCols: { 1: true, 3: true },
      wrapCols: { 0: true },
      wrapHints: { 0: 34 },
      meanCol: 2
    });
    /* Add total row with formulas and enhanced styling */
    var sr2 = rows2.length + 5;
    XLSX.utils.sheet_add_aoa(ws2, [["OVERALL TOTAL", { f: "SUM(B5:B" + (sr2 - 1) + ")", t: "n", v: rows2.reduce(function(a,r){return a+r[1];}, 0) }, "", ""]], { origin: { r: sr2, c: 0 } });
    var totalStyle = baseCellStyle({ bold: true, fill: SECTION_FILL, fontColor: SECTION_FONT, sz: 11 });
    totalStyle.border = {
      top: { style: "double", color: { rgb: "FFFFFF" } },
      bottom: { style: "medium", color: { rgb: "16233D" } },
      left: { style: "medium", color: { rgb: "16233D" } },
      right: { style: "medium", color: { rgb: "16233D" } }
    };
    setStyle(ws2, sr2, 0, totalStyle);
    setStyle(ws2, sr2, 1, baseCellStyle({ bold: true, fill: SECTION_FILL, fontColor: SECTION_FONT, center: true, sz: 11 }));
    setStyle(ws2, sr2, 2, baseCellStyle({ bold: true, fill: SECTION_FILL, fontColor: SECTION_FONT, center: true, sz: 11, numFmt: "0.00" }));
    setStyle(ws2, sr2, 3, baseCellStyle({ bold: true, fill: SECTION_FILL, fontColor: SECTION_FONT, center: true, sz: 11 }));
    /* STDEV formula in total row with enhanced styling */
    var stdStyle = baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", sz: 11 });
    stdStyle.border = {
      top: { style: "thin", color: { rgb: "FFFFFF" } },
      bottom: { style: "double", color: { rgb: "A9813E" } },
      left: { style: "medium", color: { rgb: "A9813E" } },
      right: { style: "medium", color: { rgb: "A9813E" } }
    };
    setStyle(ws2, sr2 + 1, 0, stdStyle);
    setStyle(ws2, sr2 + 1, 1, baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", sz: 11 }));
    setStyle(ws2, sr2 + 1, 2, baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", center: true, sz: 11, numFmt: "0.000" }));
    setStyle(ws2, sr2 + 1, 3, baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", center: true, sz: 11 }));
    XLSX.utils.sheet_add_aoa(ws2, [["STD DEVIATION", "", { f: "STDEV(C5:C" + (sr2 - 1) + ")", t: "n", v: 0 }, "(Across sections)"]], { origin: { r: sr2 + 1, c: 0 } });

    /* ---- Sheet 3: Item Means ---- */
    var rows3 = [];
    var secRanges3 = []; /* track section row ranges for AVERAGE formulas */
    itemNum = 1;
    SECTIONS.forEach(function(sec) {
      var secStart = rows3.length;
      rows3.push([null, null, null, null, null]); /* placeholder for section header */
      sec.items.forEach(function(text) {
        var m = calcItemMean(r, itemNum);
        rows3.push([itemNum, sec.title, text, +m.toFixed(2), interpret(m).label]);
        itemNum++;
      });
      var secEnd = rows3.length - 1;
      secRanges3.push({ sec: sec, start: secStart, end: secEnd });
    });
    var ws3 = createSheet("Item Means", ["#", "Section", "Statement", "Mean", "Interpretation"], rows3, {
      widths: [{ wch: 7 }, { wch: 26 }, { wch: 68 }, { wch: 12 }, { wch: 20 }],
      centerCols: { 0: true, 4: true },
      wrapCols: { 1: true, 2: true },
      wrapHints: { 1: 22, 2: 50 },
      meanCol: 3,
      sectionRows: secRanges3.map(function(r) { return 5 + r.start; })
    });
    /* Fill in section header text and add sub-total formulas */
    secRanges3.forEach(function(range) {
      var hr = 5 + range.start; /* header row index in sheet */
      var dr = hr + 1; /* first data row */
      var er = 5 + range.end; /* last data row */
      XLSX.utils.sheet_add_aoa(ws3, [[range.sec.title.toUpperCase(), "(" + range.sec.items.length + " items)", "", "", ""]], { origin: { r: hr, c: 0 } });
      /* Sub-total row after section data */
      var str = er + 1;
      var meanColLetter = "D";
      var formula = meanColLetter + dr + ":" + meanColLetter + er;
      XLSX.utils.sheet_add_aoa(ws3, [["", "Section Mean", { f: "AVERAGE(" + formula + ")", t: "n", v: 0 }, "", ""]], { origin: { r: str, c: 0 } });
      for (var sc = 0; sc <= 4; sc++) {
        var subStyle = baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", center: true, sz: 11 });
        subStyle.border = {
          top: { style: "double", color: { rgb: "FFFFFF" } },
          bottom: { style: "double", color: { rgb: "FFFFFF" } },
          left: { style: "thin", color: { rgb: "FFFFFF" } },
          right: { style: "thin", color: { rgb: "FFFFFF" } }
        };
        setStyle(ws3, str, sc, subStyle);
      }
      setStyle(ws3, str, 1, baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", wrap: true, sz: 11 }));
      setStyle(ws3, str, 2, baseCellStyle({ bold: true, fill: GOLD_FILL, fontColor: "FFFFFF", wrap: true, sz: 11 }));
    });

    /* ---- Sheet 4: Overview ---- */
    var allVals = [];
    r.forEach(function(res) {
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) allVals.push(v);
      }
    });
    var overallMean = mean(allVals);
    var overallSD = stdDev(allVals);
    var alpha = cronbachAlpha(r);
    var consentCount = r.filter(function(res) { return res.consent_given; }).length;
    var rows4 = [
      ["Metric", "Value"],
      ["Total Responses", r.length],
      ["Overall Mean", +overallMean.toFixed(2)],
      ["Overall SD", +overallSD.toFixed(2)],
      ["Cronbach's Alpha", alpha !== null ? +alpha.toFixed(3) : "N/A"],
      ["Consent Rate", r.length ? +(consentCount / r.length * 100).toFixed(1) + "% (" + consentCount + "/" + r.length + ")" : "N/A"],
      ["", ""],
      ["Section", "Mean", "Interpretation"]
    ];
    var itemNum = 1;
    SECTIONS.forEach(function(sec) {
      var m = calcSectionMean(r, sec, itemNum);
      rows4.push([sec.title, +m.toFixed(2), interpret(m).label]);
      itemNum += sec.items.length;
    });
    var wsOverview = createSheet("Overview", ["Metric", "Value"], rows4.slice(0, 6), {
      widths: [{ wch: 24 }, { wch: 32 }],
      forceStyleCols: { 0: true, 1: true },
      numericCols: { 1: "0.00" }
    });
    /* Manually add the section summary rows below the stat rows in the same sheet */
    var secHdrRow = 5 + 6 + 1; /* blank row after stats */
    var secStart = secHdrRow + 1;
    /* Section header row */
    XLSX.utils.sheet_add_aoa(wsOverview, [["Section", "Mean", "Interpretation"]], { origin: { r: secHdrRow, c: 0 } });
    for (var shc = 0; shc <= 2; shc++) {
      setStyle(wsOverview, secHdrRow, shc, baseCellStyle({
        bold: true, fill: SECTION_FILL, fontColor: SECTION_FONT, sz: 10, center: true
      }));
    }
    rows4.slice(7).forEach(function(row, i) {
      var ri = secStart + i;
      XLSX.utils.sheet_add_aoa(wsOverview, [[row[0], row[1], row[2]]], { origin: { r: ri, c: 0 } });
      if (i === 0) {
        setStyle(wsOverview, ri, 0, baseCellStyle({ bold: true, wrap: true, sz: 11 }));
      } else {
        setStyle(wsOverview, ri, 0, baseCellStyle({ wrap: true, fill: (i % 2 === 0 ? ROW_EVEN : ROW_ODD) }));
      }
      /* Enhanced mean and interpretation cell styling with borders */
      var meanStyle = baseCellStyle({ center: true, bold: true, sz: 11, numFmt: "0.00", fill: meanFill(row[1]), fontColor: meanColor(row[1]) });
      meanStyle.border = {
        top: { style: "medium", color: { rgb: "A9813E" } },
        bottom: { style: "medium", color: { rgb: "A9813E" } },
        left: { style: "medium", color: { rgb: "A9813E" } },
        right: { style: "thin", color: { rgb: "A9813E" } }
      };
      var interpStyle = baseCellStyle({ center: true, bold: true, sz: 11, fill: meanFill(row[1]), fontColor: meanColor(row[1]) });
      interpStyle.border = {
        top: { style: "medium", color: { rgb: "A9813E" } },
        bottom: { style: "medium", color: { rgb: "A9813E" } },
        left: { style: "thin", color: { rgb: "A9813E" } },
        right: { style: "medium", color: { rgb: "A9813E" } }
      };
      setStyle(wsOverview, ri, 1, meanStyle);
      setStyle(wsOverview, ri, 2, interpStyle);
    });

    /* ---- Sheet 5: Statistics ---- */
    var statHdrs = ["#", "Section", "Statement", "n", "Mean", "SD", "SA (4)", "A (3)", "D (2)", "SD (1)", "Interpretation"];
    var rows5 = [];
    var secRanges5 = [];
    itemNum = 1;
    SECTIONS.forEach(function(sec) {
      var secStart = rows5.length;
      rows5.push([null, null, null, null, null, null, null, null, null, null, null]);
      sec.items.forEach(function(text) {
        var iv = itemValues(r, itemNum);
        var im = mean(iv);
        var isd = stdDev(iv);
        var fc = freqCount(iv);
        var nn = iv.length;
        var p = function(n, v) { return nn ? (v / nn * 100).toFixed(1) : "0.0"; };
        rows5.push([
          itemNum, sec.title, text, nn, +im.toFixed(2), +isd.toFixed(2),
          fc[4] + " (" + p(nn, fc[4]) + "%)",
          fc[3] + " (" + p(nn, fc[3]) + "%)",
          fc[2] + " (" + p(nn, fc[2]) + "%)",
          fc[1] + " (" + p(nn, fc[1]) + "%)",
          interpret(im).label

  function renderMarkdown(text) {
    // Strip image references (AI cannot send images)
    text = text.replace(/!\[.*?\]\(.*?\)/g, "[image not supported]");
    // Escape HTML first to prevent XSS, then apply markdown
    text = esc(text);
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:underline;">$1</a>');
    text = text.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
    text = text.replace(/\*(.+?)\*/g, "<i>$1</i>");
    text = text.replace(/`(.+?)`/g, "<code>$1</code>");
    // Lists: lines starting with "- " or "* "
    var lines = text.split("\n");
    var result = [];
    var inUl = false, inOl = false;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (/^[-*]\s/.test(line)) {
        if (inOl) { result.push("</ol>"); inOl = false; }
        if (!inUl) { result.push("<ul>"); inUl = true; }
        result.push("<li>" + line.replace(/^[-*]\s/, "") + "</li>");
      } else if (/^\d+[.)]\s/.test(line)) {
        if (inUl) { result.push("</ul>"); inUl = false; }
        if (!inOl) { result.push("<ol>"); inOl = true; }
        result.push("<li>" + line.replace(/^\d+[.)]\s/, "") + "</li>");
      } else {
        if (inUl) { result.push("</ul>"); inUl = false; }
        if (inOl) { result.push("</ol>"); inOl = false; }
        if (line === "") { result.push("<br>"); } else { result.push(line); }
      }
    }
    if (inUl) result.push("</ul>");
    if (inOl) result.push("</ol>");
    return result.join("\n");
  }

  function attachChatHandlers() {
    var btn = document.getElementById("chat-btn");
    var close = document.getElementById("chat-close");
    var send = document.getElementById("chat-send");
    var input = document.getElementById("chat-input");
    var panel = document.getElementById("chat-panel");
    if (btn) btn.addEventListener("click", function() {
      STATE.chatOpen = !STATE.chatOpen;
      render();
      if (STATE.chatOpen) setTimeout(focusChatInput, 150);
      setTimeout(scrollChat, 100);
    });
    if (close) close.addEventListener("click", function() { STATE.chatOpen = false; render(); });
    if (send) send.addEventListener("click", function() {
      if (STATE.chatLoading) { cancelChatRequest(); return; }
      sendChatMessage();
    });
    if (input) {
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
      });
      input.addEventListener("input", function() {
        STATE.chatInputChars = this.value.length;
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
      });
    }
    var clearBtn = document.getElementById("chat-clear");
    if (clearBtn) clearBtn.addEventListener("click", function() {
      if (confirm("Clear chat history?")) { STATE.chatMessages = []; saveChatMessages(); render(); }
    });
    var settingsBtn = document.getElementById("chat-settings-btn");
    if (settingsBtn) settingsBtn.addEventListener("click", function() {
      STATE.chatSettingsOpen = !STATE.chatSettingsOpen;
      render();
    });
    var resizeHandle = document.getElementById("chat-resize-handle");
    if (resizeHandle) resizeHandle.addEventListener("mousedown", function(e) {
      e.preventDefault();
      var panel = document.getElementById("chat-panel");
      if (!panel) return;
      var startX = e.clientX, startY = e.clientY;
      var startW = panel.offsetWidth, startH = panel.offsetHeight;
      function onMove(ev) {
            var w = Math.min(1200, Math.max(280, startW - (ev.clientX - startX)));
        var h = Math.min(1000, Math.max(300, startH - (ev.clientY - startY)));
        panel.style.width = w + "px";
        panel.style.maxHeight = h + "px";
      }
      function onUp() {
        SETTINGS.panelWidth = String(panel.offsetWidth);
        SETTINGS.panelHeight = String(panel.offsetHeight);
        saveSettings();
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        document.body.style.userSelect = "";
        document.body.style.cursor = "";
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
      document.body.style.userSelect = "none";
      document.body.style.cursor = "nw-resize";
    });
    document.addEventListener("click", function(e) {
      var suggest = e.target.closest(".chat-suggest");
      if (suggest) {
        var q = suggest.getAttribute("data-q");
        if (q) sendChatMessage(q);
      }
      var retry = e.target.closest(".chat-retry");
      if (retry) retryLastMessage();
      var preset = e.target.closest(".chat-model-preset");
      if (preset) {
        var model = preset.getAttribute("data-model");
        var input = document.getElementById("chat-set-model");
        if (model && input) { input.value = model; }
      }
    });
    var saveBtn = document.getElementById("chat-settings-save");
    if (saveBtn) saveBtn.addEventListener("click", function() {
      var ep = document.getElementById("chat-set-endpoint");
      var md = document.getElementById("chat-set-model");
      var pv = document.getElementById("chat-set-provider");
      var wd = document.getElementById("chat-set-width");
      var ht = document.getElementById("chat-set-height");
      var sp = document.getElementById("chat-set-prompt");
      var ak = document.getElementById("chat-set-apikey");
      if (ep && md && pv && wd && ht && sp) {
        SETTINGS.aiEndpoint = ep.value.trim();
        SETTINGS.aiModel = md.value.trim();
        SETTINGS.aiProvider = pv.value;
        SETTINGS.systemPrompt = sp.value;
        SETTINGS.panelWidth = String(Math.min(1200, Math.max(280, Number(wd.value) || 600)));
        SETTINGS.panelHeight = String(Math.min(1000, Math.max(300, Number(ht.value) || 700)));
        if (ak) SETTINGS.apiKey = ak.value.trim();
        saveSettings();
        STATE.chatSettingsOpen = false;
        render();
        showToast("AI settings saved");
      }
    });
    var cancelBtn = document.getElementById("chat-settings-cancel");
    if (cancelBtn) cancelBtn.addEventListener("click", function() {
      STATE.chatSettingsOpen = false;
      render();
    });
    var resetBtn = document.getElementById("chat-settings-reset");
    if (resetBtn) resetBtn.addEventListener("click", function() {
      if (confirm("Reset AI settings to defaults?")) {
        SETTINGS = defaultSettings();
        saveSettings();
        STATE.chatSettingsOpen = false;
        render();
        showToast("AI settings reset to defaults");
      }
    });
    var modelSelect = document.getElementById("chat-model-select");
    if (modelSelect) modelSelect.addEventListener("change", function() {
      SETTINGS.aiModel = this.value;
      STATE.tokenUsage = null;
      try { localStorage.removeItem("prism_token_usage"); } catch(e) {}
      saveSettings();
      showToast("Model switched to " + this.options[this.selectedIndex].text);
    });
    document.addEventListener("click", function(e) {
      var tabBtn = e.target.closest("#chat-tab-chat, #chat-tab-image");
      if (tabBtn) {
        STATE.chatTab = tabBtn.getAttribute("data-tab") || "chat";
        render();
      }
      var genBtn = e.target.closest("#img-generate");
      if (genBtn && !genBtn.disabled) generateImage();
    });
  }

  function buildDataContext() {
    if (!STATE.chatContextDirty && STATE.chatContextCache) return STATE.chatContextCache;
    var r = STATE.filteredResponses;
    if (!r.length) return "No survey data available yet.";
    var n = r.length, lines = [];

    lines.push("SURVEY DATA REPORT");
    lines.push("Total respondents: " + n);

    // Age info
    var ages = r.map(function(x){return x.respondent_age}).filter(function(a){return a && a>0});
    if (ages.length) {
      var avgAge = ages.reduce(function(s,v){return s+v},0) / ages.length;
      lines.push("Age range: " + Math.min.apply(null,ages) + " to " + Math.max.apply(null,ages) + " (mean " + avgAge.toFixed(1) + ")");
    }

    // Overall stats
    var allRatings = [];
    r.forEach(function(res) {
      for (var k = 1; k <= TOTAL_ITEMS; k++) { var v = (res.answers || {})[String(k)]; if (v) allRatings.push(v); }
    });
    var overallMean = mean(allRatings);
    var overallSD = stdDev(allRatings);
    lines.push("Scale: 1=Strongly Disagree, 2=Disagree, 3=Agree, 4=Strongly Agree");
    lines.push("Overall mean rating: " + overallMean.toFixed(2) + " (SD: " + overallSD.toFixed(2) + ")");

    var totalAlpha = cronbachAlpha(r);
    lines.push("Overall Cronbach's alpha: " + (totalAlpha !== null ? totalAlpha.toFixed(3) : "N/A") + " — " + alphaLabel(totalAlpha));

    // Per-item stats
    lines.push(""); lines.push("ITEM-LEVEL STATISTICS");
    for (var k = 1; k <= TOTAL_ITEMS; k++) {
      var vals = itemValues(r, k);
      var m = mean(vals);
      var sd = stdDev(vals);
      var freq = freqCount(vals);
      lines.push("Item " + k + ": mean=" + m.toFixed(2) + " SD=" + sd.toFixed(2) + " freq={1:" + freq[1] + ",2:" + freq[2] + ",3:" + freq[3] + ",4:" + freq[4] + "}");
    }

    // Section-level stats
    lines.push(""); lines.push("SECTION-LEVEL STATISTICS");
    var itemIdx = 1;
    SECTIONS.forEach(function(sec) {
      var svals = [];
      r.forEach(function(res) {
        var s = 0;
        sec.items.forEach(function(_, j) {
          var v = (res.answers || {})[String(itemIdx + j)];
          if (v) s += v;
        });
        svals.push(s / sec.items.length);
      });
      var secMean = mean(svals);
      var secSD = stdDev(svals);
      var secAlpha = cronbachAlphaSection(r, sec, itemIdx);
      lines.push(sec.title + ": mean=" + secMean.toFixed(2) + " SD=" + secSD.toFixed(2) + " alpha=" + (secAlpha !== null ? secAlpha.toFixed(3) : "N/A"));
      itemIdx += sec.items.length;
    });

    // Demographics
    lines.push(""); lines.push("DEMOGRAPHICS");
    var sexCounts = {}, typeCounts = {};
    r.forEach(function(res) {
      var sx = res.respondent_sex || "Unknown"; sexCounts[sx] = (sexCounts[sx] || 0) + 1;
      var tp = res.respondent_user_type || "Unknown"; typeCounts[tp] = (typeCounts[tp] || 0) + 1;
    });
    lines.push("Sex: " + JSON.stringify(sexCounts));
    lines.push("User types: " + JSON.stringify(typeCounts));

    // Inter-section correlations
    lines.push(""); lines.push("INTER-SECTION CORRELATIONS (Pearson r)");
    var secMeans = [];
    itemIdx = 1;
    SECTIONS.forEach(function(sec) {
      var svals = [];
      r.forEach(function(res) {
        var s = 0;
        sec.items.forEach(function(_, j) {
          var v = (res.answers || {})[String(itemIdx + j)];
          if (v) s += v;
        });
        svals.push(s);
      });
      secMeans.push({ title: sec.title, vals: svals });
      itemIdx += sec.items.length;
    });
    for (var i = 0; i < secMeans.length; i++) {
      for (var j2 = i+1; j2 < secMeans.length; j2++) {
        var corr = pearsonCorr(secMeans[i].vals, secMeans[j2].vals);
        var label = "weak";
        if (Math.abs(corr) >= 0.7) label = "strong";
        else if (Math.abs(corr) >= 0.4) label = "moderate";
        lines.push(secMeans[i].title + " vs " + secMeans[j2].title + ": r=" + corr.toFixed(3) + " (" + label + ")");
      }
    }

    // T-test: Students vs Faculty (if both present)
    var studentScores = [], facultyScores = [];
    r.forEach(function(res) {
      var s = 0;
      for (var k = 1; k <= TOTAL_ITEMS; k++) { var v = (res.answers || {})[String(k)]; if (v) s += v; }
      if (res.respondent_user_type === "Student") studentScores.push(s / TOTAL_ITEMS);
      if (res.respondent_user_type === "Faculty / Teacher") facultyScores.push(s / TOTAL_ITEMS);
    });
    if (studentScores.length > 1 && facultyScores.length > 1) {
      var tt = tTestIndependent(studentScores, facultyScores);
      if (tt) {
        lines.push(""); lines.push("T-TEST: Students vs Faculty");
        lines.push("Students mean=" + tt.mean1.toFixed(2) + " (n=" + studentScores.length + "), Faculty mean=" + tt.mean2.toFixed(2) + " (n=" + facultyScores.length + ")");
        lines.push("t(" + tt.df.toFixed(1) + ")=" + tt.t.toFixed(3) + " p=" + tt.p.toFixed(4));
      }
    }

    STATE.chatContextCache = lines.join("\n");
    STATE.chatContextDirty = false;
    return STATE.chatContextCache;
  }

  function focusChatInput() {
    setTimeout(function() {
      var el = document.getElementById("chat-input");
      if (el) el.focus();
    }, 50);
  }

  function cancelChatRequest() {
    if (STATE.chatController) {
      STATE.chatController.abort();
      STATE.chatController = null;
    }
    STATE.chatLoading = false;
    render();
  }

  function retryLastMessage() {
    var lastBotIdx = -1;
    for (var i = STATE.chatMessages.length - 1; i >= 0; i--) {
      if (STATE.chatMessages[i].role === "bot") { lastBotIdx = i; break; }
    }
    if (lastBotIdx === -1 || STATE.chatLoading) return;
    STATE.chatMessages.splice(lastBotIdx, 1);
    STATE.chatLoading = true;
    render();
    scrollChat();
    callChatAPI();
  }

  async function callChatAPI() {
    var context = buildDataContext();
    var systemPrompt = (SETTINGS.systemPrompt || DEFAULT_SYSTEM_PROMPT)
      + "\n\nYou have access to the following data:\n"
      + "- Survey responses\n"
      + "- Mean scores\n"
      + "- Section results\n"
      + "- Item-level ratings\n"
      + "- Cronbach's Alpha reliability results\n"
      + "- Demographic information\n\n"
      + "Here is the complete computed data:\n" + context;
    var apiMessages = [
      { role: "system", content: systemPrompt }
    ];
    var history = STATE.chatMessages.slice(-20);
    history.forEach(function(m) {
      apiMessages.push({ role: m.role === "bot" ? "assistant" : "user", content: m.content });
    });
    try {
      STATE.chatController = new AbortController();
      var timeout = setTimeout(function() { if (STATE.chatController) STATE.chatController.abort(); }, 30000);
      var reply = "No response.";
      if (SETTINGS.aiProvider === "gemini") {
        var geminiKey = SETTINGS.apiKey || "";
        if (!geminiKey) throw new Error("Gemini API key not configured. Set it in AI Settings.");
        var geminiModel = SETTINGS.aiModel || "gemini-3.5-flash";
        var geminiContents = [];
        apiMessages.forEach(function(m) {
          if (m.role === "system") {
            geminiContents.push({ role: "user", parts: [{ text: "[System instruction]: " + m.content }] });
            geminiContents.push({ role: "model", parts: [{ text: "Understood." }] });
          } else {
            geminiContents.push({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] });
          }
        });
        var resp = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + geminiModel + ":generateContent?key=" + geminiKey, {
          method: "POST",
          signal: STATE.chatController.signal,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: geminiContents })
        });
        clearTimeout(timeout);
        STATE.chatController = null;
        if (!resp.ok) {
          var errBody = await resp.json().catch(function(){ return {}; });
          throw new Error((errBody.error && errBody.error.message) || "Gemini HTTP " + resp.status);
        }
        var data = await resp.json();
        if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
          reply = data.candidates[0].content.parts.map(function(p){return p.text}).join("\n") || reply;
        }
      } else {
        var resp = await fetch("/api/chat", {
          method: "POST",
          signal: STATE.chatController.signal,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            endpoint: SETTINGS.aiEndpoint,
            model: SETTINGS.aiModel,
            messages: apiMessages
          })
        });
        clearTimeout(timeout);
        STATE.chatController = null;
        if (!resp.ok) {
          var errBody = await resp.json().catch(function(){ return {error:"Failed to connect"}; });
          var errMsg = typeof errBody.error === "object" && errBody.error ? errBody.error.message || errBody.error : errBody.error;
          throw new Error(errMsg || "HTTP " + resp.status);
        }
        var data = await resp.json();
        if (SETTINGS.aiProvider === "openai" && data.choices && data.choices[0] && data.choices[0].message) {
          reply = data.choices[0].message.content || reply;
        } else if (data.message && data.message.content) {
          reply = data.message.content;
        }
      }
      reply = reply.replace(/!\[.*?\]\(.*?\)/g, "").replace(/\[image[^\]]*\]/gi, "");
      STATE.chatMessages.push({ role: "bot", content: reply });
    } catch (err) {
      console.error("Chat error:", err);
      STATE.chatController = null;
      var msg;
      if (err.name === "AbortError") {
        msg = "Request cancelled.";
      } else if (err.message && /rate.limit|rate_limit_exceeded/i.test(err.message)) {
        var m = err.message;
        var model = (m.match(/model\s+`?([^`\s]+)`?/) || [])[1] || "";
        var waitTime = (m.match(/try again in\s+([^\s.]+)/) || [])[1] || "";
        var usage = (m.match(/(?:Limit|limit)\D*?(\d+)\D*?Used\D*?(\d+)\D*?Requested\D*?(\d+)/) || []);
        var pct = usage.length >= 3 ? Math.round(Number(usage[2]) / Number(usage[1]) * 100) : 0;
        STATE.tokenUsage = { model: model, limit: usage[1], used: usage[2], pct: pct, waitTime: waitTime };
        if (usage.length >= 3) try { localStorage.setItem("prism_token_usage", JSON.stringify(STATE.tokenUsage)); } catch(e) {}
        var link = (m.match(/https?:\/\/\S+/g) || [])[0] || "";
        msg = "**Rate limit exceeded**" + (model ? " for **" + model + "**" : "")
          + (waitTime ? "\n\nPlease try again in **" + waitTime + "**." : "")
          + (usage.length >= 3 ? "\n\nToken usage: **" + pct + "%** of daily limit (" + usage[2] + "/" + usage[1] + ")" : "")
          + (link ? "\n\n[Upgrade at Groq Console](" + link + ")" : "");
      } else {
        msg = err.message || "Sorry, I couldn't reach the assistant just now. Please try again.";
      }
      STATE.chatMessages.push({ role: "bot", content: msg, isError: true });
    }
    STATE.chatLoading = false;
    saveChatMessages();
    render();
    scrollChat();
    focusChatInput();
  }

  async function sendChatMessage(forcedText) {
    var input = document.getElementById("chat-input");
    var text;
    if (forcedText) { text = forcedText; }
    else {
      if (!input || !input.value.trim() || STATE.chatLoading) return;
      text = input.value.trim();
      if (text.length > CHAT_MAX_CHARS) { showToast("Message too long (" + text.length + " > " + CHAT_MAX_CHARS + " chars)"); return; }
      input.value = "";
      input.style.height = "auto";
      STATE.chatInputChars = 0;
    }
    if (!text || STATE.chatLoading) return;
    STATE.chatMessages.push({ role: "user", content: text });
    STATE.chatLoading = true;
    saveChatMessages();
    render();
    scrollChat();
    await callChatAPI();
  }

  async function generateImage() {
    var prompt = document.getElementById("img-prompt");
    if (!prompt || !prompt.value.trim() || STATE.imgLoading) return;
    var text = prompt.value.trim();
    if (SETTINGS.aiProvider !== "gemini" || !SETTINGS.apiKey) {
      showToast("Image generation requires Google Gemini provider with API key set in AI Settings");
      return;
    }
    STATE.imgLoading = true;
    render();
    try {
      var imgModel = "gemini-3-pro-image";
      var body = { contents: [{ parts: [{ text: text }] }] };
      var resp = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + imgModel + ":generateContent?key=" + SETTINGS.apiKey, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        var errBody = await resp.json().catch(function(){ return {}; });
        throw new Error((errBody.error && errBody.error.message) || "HTTP " + resp.status);
      }
      var data = await resp.json();
      if (!STATE.generatedImages) STATE.generatedImages = [];
      if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
        data.candidates[0].content.parts.forEach(function(part) {
          if (part.inlineData && part.inlineData.mimeType && part.inlineData.mimeType.indexOf("image/") === 0 && part.inlineData.data) {
            STATE.generatedImages.push({ dataUrl: "data:" + part.inlineData.mimeType + ";base64," + part.inlineData.data, alt: text });
          }
        });
      }
      if (!STATE.generatedImages.length) {
        var reply = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts ? data.candidates[0].content.parts.map(function(p){return p.text}).join("\n") : "";
        showToast(reply || "No image data returned. Try a more detailed prompt.");
      } else {
        prompt.value = "";
        showToast("Image generated!");
      }
    } catch (err) {
      console.error("Image gen error:", err);
      showToast("Image generation failed: " + (err.message || "Unknown error"));
    }
    STATE.imgLoading = false;
    render();
  }

  function scrollChat() {
    setTimeout(function() {
      var el = document.getElementById("chat-msgs");
      if (el) el.scrollTop = el.scrollHeight;
    }, 50);
  }

  try { var tu = localStorage.getItem("prism_token_usage"); if (tu) STATE.tokenUsage = JSON.parse(tu); } catch(e) {}
  supabaseClient.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      STATE.loggedIn = true;
      STATE.userId = res.data.session.user.id;
      STATE.userEmail = res.data.session.user.email;
      sessionStorage.setItem("prism_admin", "1");
      loadChatMessages();
      loadResponses();
    } else {
      render();
    }
  });
})();
</script>
