<body>
<div id="admin-root"></div>
<style>
  :root {
    --ink: #16233D;
    --ink-2: #2E4066;
    --gold: #A9813E;
    --gold-soft: #D9C08F;
    --line: #C9D2E0;
    --paper: #EEF1F6;
    --surface: #FFFFFF;
    --muted: #5B6B85;
    --success: #3F7A5C;
    --error: #B3432E;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; }

  .login-wrap {
    max-width: 380px;
    margin: 80px auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 12px 32px -16px rgba(22,35,61,0.18);
    padding: 40px 32px;
    text-align: center;
  }
  .login-wrap h1 { font-size: 22px; margin: 0 0 6px; }
  .login-wrap p { font-size: 13.5px; color: var(--muted); margin: 0 0 24px; }
  .login-wrap input {
    width: 100%;
    padding: 10px 14px;
    font-size: 14px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    margin-bottom: 14px;
    outline: none;
  }
  .login-wrap input:focus { border-color: var(--ink-2); }
  .login-wrap .err { color: var(--error); font-size: 13px; margin-bottom: 12px; display: none; }
  .login-wrap button {
    all: unset;
    cursor: pointer;
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    text-align: center;
  }
  .login-wrap button:hover { background: var(--ink-2); }

  .shell {
    max-width: 1100px;
    margin: 24px auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(22,35,61,0.04), 0 12px 32px -16px rgba(22,35,61,0.18);
    overflow: hidden;
    position: relative;
  }
  .shell::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--ink) 0%, var(--ink-2) 55%, var(--gold) 100%);
  }
  .masthead {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
  }
  .masthead h1 { font-size: 22px; margin: 0; }
  .masthead .sub { font-size: 13px; color: var(--muted); margin: 2px 0 0; }
  .masthead .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    all: unset;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.15s ease;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: var(--ink-2); }
  .btn-ghost { color: var(--ink-2); border: 1.5px solid var(--line); background: var(--surface); }
  .btn-ghost:hover { border-color: var(--ink-2); }
  .btn-danger { background: var(--error); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    gap: 0;
    overflow-x: auto;
  }
  .tab {
    all: unset;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--ink); border-bottom-color: var(--gold); }

  .panel { display: none; padding: 28px 32px; }
  .panel.active { display: block; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-card .label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--ink); margin-top: 4px; }
  .stat-card .note { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  th {
    background: var(--paper);
    font-weight: 700;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-2);
    position: sticky;
    top: 0;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(22,35,61,0.02); }

  .mean-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 200px;
  }
  .mean-bar {
    flex: 1;
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .mean-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .mean-val {
    font-weight: 700;
    font-size: 13px;
    min-width: 32px;
    text-align: right;
  }

  .interp {
    display: inline-block;
    font-size: 11.5px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .interp.excellent { background: #E8F5E9; color: #2E7D32; }
  .interp.good { background: #E3F2FD; color: #1565C0; }
  .interp.fair { background: #FFF8E1; color: #F57F17; }
  .interp.poor { background: #FBEAE5; color: var(--error); }

  .section-heading {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin: 28px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold);
  }
  .section-heading:first-child { margin-top: 0; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--line);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .export-menu { position: relative; display: inline-block; }
  .export-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 8px 24px -8px rgba(22,35,61,0.2);
    z-index: 10;
    min-width: 160px;
  }
  .export-dropdown.show { display: block; }
  .export-dropdown button {
    all: unset;
    display: block;
    width: 100%;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
  }
  .export-dropdown button:hover { background: var(--paper); }

  /* filters */
  .filter-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .filter-group select, .filter-group input {
    padding: 7px 10px;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    background: var(--surface);
    color: var(--ink);
  }
  .filter-group select:focus, .filter-group input:focus { outline: 2px solid var(--ink-2); border-color: var(--ink-2); }
  .filter-count { font-size: 12px; color: var(--muted); padding: 7px 0; }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(22,35,61,0.06);
    position: relative;
    overflow: hidden;
  }
  .chart-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--ink), var(--gold));
    border-radius: 12px 12px 0 0;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .chart-card:hover::before { opacity: 1; }
  .chart-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin: 0;
    color: var(--ink);
  }
  .chart-card .chart-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--paper);
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .chart-card .chart-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin: 4px 0 0;
  }
  .chart-card canvas { width: 100% !important; }
  .chart-card-wide { grid-column: 1 / -1; }
  .chart-card-half canvas { max-height: 240px; }

  @media (max-width: 640px) {
    .panel { padding: 16px 14px; }
    .masthead {
      padding: 16px 14px;
      flex-direction: column;
      align-items: flex-start;
    }
    .masthead h1 { font-size: 18px; }
    .masthead .sub { font-size: 12px; }
    .masthead .actions { width: 100%; justify-content: flex-start; }
    .tabs { padding: 0 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { padding: 12px 14px; font-size: 12px; }
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { padding: 12px 14px; }
    .stat-card .value { font-size: 22px; }
    .stat-card .label { font-size: 10.5px; }
    .chart-grid { grid-template-columns: 1fr; }
    .chart-card { padding: 14px; }
    .chart-card h3 { font-size: 12px; }
    .filter-bar { flex-direction: column; gap: 10px; padding: 12px; }
    .filter-group { width: 100%; }
    .filter-group select, .filter-group input { width: 100%; }
    .section-heading { font-size: 14px; margin: 20px 0 10px; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
    .mean-bar-wrap { min-width: 120px; }
    .btn { font-size: 12px; padding: 6px 12px; }
    .login-wrap { margin: 40px 16px; padding: 28px 20px; }
    .login-wrap h1 { font-size: 20px; }
  }

  @media (min-width: 641px) and (max-width: 900px) {
    .panel { padding: 24px 24px; }
    .masthead { padding: 24px 24px 18px; }
    .tabs { padding: 0 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 901px) and (max-width: 1200px) {
    .shell { max-width: 1000px; }
  }
</style>
</head>
<body>
<div id="admin-root"></div>
<script>
(function() {
  "use strict";

  var root = document.getElementById("admin-root");

  var STATE = {
    loggedIn: sessionStorage.getItem("prism_admin") === "1",
    loading: true,
    responses: [],
    filteredResponses: [],
    activeTab: "overview",
    exportOpen: false,
    filters: { userType: "all", dateFrom: "", dateTo: "" },
    charts: {}
  };

  var SECTIONS = [
    { key: "usability", title: "A. Usability", items: [
      "PRISM is easy to access and use for my school-related tasks.",
      "The navigation of PRISM is simple and easy to understand.",
      "The layout and interface design of PRISM are clear and well-organized.",
      "The menus, buttons, and icons in PRISM are easy to recognize and use.",
      "I can easily find the information and features I need in PRISM.",
      "The information displayed in PRISM is clear and easy to understand.",
      "I can learn how to use PRISM without requiring much assistance.",
      "PRISM can be used effectively on different devices such as computers, tablets, and smartphones.",
      "I can complete my tasks in PRISM without difficulty.",
      "Overall, PRISM provides a user-friendly experience."
    ]},
    { key: "func", title: "B. Functional Suitability", items: [
      "PRISM's features and functions work properly.",
      "PRISM effectively supports school management activities.",
      "PRISM provides accurate and reliable school-related information.",
      "PRISM allows users to access needed records and information efficiently.",
      "PRISM helps manage student records such as enrollment information, attendance, and academic records.",
      "PRISM supports teachers in managing grades, attendance, and academic-related tasks.",
      "PRISM improves the distribution of announcements and important school information.",
      "PRISM's messaging and notification features help improve communication among users.",
      "PRISM provides access to learning materials and academic resources when needed.",
      "PRISM provides the necessary functions required for a school management system."
    ]},
    { key: "satisfaction", title: "C. User Satisfaction", items: [
      "PRISM provides the information I need for my school-related activities.",
      "The information provided by PRISM is relevant and useful.",
      "The records and information displayed in PRISM are accurate.",
      "PRISM presents information in an organized and understandable format.",
      "The design and presentation of PRISM make information easier to view and interpret.",
      "PRISM provides updated information when needed.",
      "PRISM delivers announcements, notifications, and updates in a timely manner.",
      "PRISM meets my expectations as a school management portal.",
      "I am satisfied with the overall performance of PRISM.",
      "I believe PRISM is beneficial for improving school information and management processes."
    ]}
  ];

  var ITEM_MAP = {};
  var idx = 1;
  SECTIONS.forEach(function(sec) {
    sec.items.forEach(function(text) { ITEM_MAP[idx] = text; idx++; });
  });
  var TOTAL_ITEMS = idx - 1;

  var COLORS = [
    "#2E4066","#A9813E","#3F7A5C","#B3432E","#5B6B85",
    "#D9C08F","#1565C0","#F57F17","#7B1FA2","#00838F"
  ];

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  function interpret(mean) {
    if (mean >= 3.5) return { label: "Excellent", cls: "excellent" };
    if (mean >= 2.5) return { label: "Good", cls: "good" };
    if (mean >= 1.5) return { label: "Fair", cls: "fair" };
    return { label: "Poor", cls: "poor" };
  }

  function barColor(mean) {
    if (mean >= 3.5) return "var(--success)";
    if (mean >= 2.5) return "var(--ink-2)";
    if (mean >= 1.5) return "var(--gold)";
    return "var(--error)";
  }

  function mean(arr) {
    if (!arr.length) return 0;
    return arr.reduce(function(a, b) { return a + b; }, 0) / arr.length;
  }

  function calcSectionMean(responses, section, itemStartNum) {
    var vals = [];
    responses.forEach(function(r) {
      section.items.forEach(function(_, i) {
        var v = (r.answers || {})[String(itemStartNum + i)];
        if (v) vals.push(v);
      });
    });
    return mean(vals);
  }

  function calcItemMean(responses, itemNum) {
    var vals = [];
    responses.forEach(function(r) {
      var v = (r.answers || {})[String(itemNum)];
      if (v) vals.push(v);
    });
    return mean(vals);
  }

  /* filters */
  function applyFilters() {
    var r = STATE.responses;
    var f = STATE.filters;
    if (f.userType !== "all") {
      r = r.filter(function(res) { return res.respondent_user_type === f.userType; });
    }
    if (f.dateFrom) {
      var from = new Date(f.dateFrom);
      r = r.filter(function(res) { return new Date(res.submitted_at) >= from; });
    }
    if (f.dateTo) {
      var to = new Date(f.dateTo);
      to.setHours(23,59,59,999);
      r = r.filter(function(res) { return new Date(res.submitted_at) <= to; });
    }
    STATE.filteredResponses = r;
  }

  function getUserTypes() {
    var types = {};
    STATE.responses.forEach(function(r) {
      var t = r.respondent_user_type || "Unknown";
      types[t] = true;
    });
    return Object.keys(types).sort();
  }

  function renderLogin() {
    return (
      '<div class="login-wrap">' +
        '<h1 class="serif">PRISM Dashboard</h1>' +
        '<p>Enter the researcher password to access survey results.</p>' +
        '<div class="err" id="login-err">Incorrect password. Try again.</div>' +
        '<input type="password" id="login-pass" placeholder="Password" />' +
        '<button id="login-btn">Access Dashboard</button>' +
      '</div>'
    );
  }

  function renderFilters() {
    var types = getUserTypes();
    var typeOptions = '<option value="all">All User Types</option>';
    types.forEach(function(t) {
      typeOptions += '<option value="' + esc(t) + '"' + (STATE.filters.userType === t ? ' selected' : '') + '>' + esc(t) + '</option>';
    });
    return (
      '<div class="filter-bar">' +
        '<div class="filter-group"><label>User Type</label><select id="f-type">' + typeOptions + '</select></div>' +
        '<div class="filter-group"><label>From</label><input type="date" id="f-from" value="' + STATE.filters.dateFrom + '" /></div>' +
        '<div class="filter-group"><label>To</label><input type="date" id="f-to" value="' + STATE.filters.dateTo + '" /></div>' +
        '<div class="filter-count">Showing <b>' + STATE.filteredResponses.length + '</b> of ' + STATE.responses.length + ' responses</div>' +
        '<button class="btn btn-ghost btn-sm" id="f-reset">Reset</button>' +
      '</div>'
    );
  }

  function renderDashboard() {
    var r = STATE.filteredResponses;
    var tabs = [
      { id: "overview", label: "Overview" },
      { id: "charts", label: "Charts" },
      { id: "means", label: "Mean Scores" },
      { id: "bytype", label: "By User Type" },
      { id: "responses", label: "All Responses" },
      { id: "demographics", label: "Demographics" }
    ];
    var html = '<div class="shell">';
    html += '<div class="masthead"><div><h1 class="serif">PRISM Evaluation Dashboard</h1><p class="sub">Portal for Records, Information, and School Management</p></div>';
    html += '<div class="actions">';
    html += '<a href="index.html" class="btn btn-ghost">Back to Form</a>';
    html += '<div class="export-menu"><button class="btn btn-ghost" id="export-toggle">&#8681; Export</button>';
    html += '<div class="export-dropdown" id="export-dropdown"><button id="export-excel">Export Excel</button><button id="export-csv">Export CSV</button><button id="export-json">Export JSON</button></div></div>';
    html += '<button class="btn btn-ghost" id="refresh-btn">&#8635; Refresh</button>';
    html += '<button class="btn btn-danger" id="logout-btn">Logout</button>';
    html += '</div></div>';

    html += '<div class="tabs">';
    tabs.forEach(function(t) {
      html += '<button class="tab' + (STATE.activeTab === t.id ? " active" : "") + '" data-tab="' + t.id + '">' + t.label + '</button>';
    });
    html += '</div>';

    html += renderFilters();

    if (STATE.activeTab === "overview") html += renderOverview(r);
    else if (STATE.activeTab === "charts") html += renderCharts(r);
    else if (STATE.activeTab === "means") html += renderMeans(r);
    else if (STATE.activeTab === "bytype") html += renderByType(r);
    else if (STATE.activeTab === "responses") html += renderResponses(r);
    else if (STATE.activeTab === "demographics") html += renderDemographics(r);

    html += '</div>';
    return html;
  }

  function renderOverview(r) {
    var html = '<div class="panel active">';
    var n = r.length;
    var allVals = [];
    r.forEach(function(res) {
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) allVals.push(v);
      }
    });
    var overallMean = mean(allVals);
    var userTypes = {};
    r.forEach(function(res) {
      var t = res.respondent_user_type || "Unknown";
      userTypes[t] = (userTypes[t] || 0) + 1;
    });

    html += '<div class="stat-grid">';
    html += '<div class="stat-card"><div class="label">Total Responses</div><div class="value">' + n + '</div><div class="note">submissions collected</div></div>';
    html += '<div class="stat-card"><div class="label">Overall Mean</div><div class="value">' + overallMean.toFixed(2) + '</div><div class="note">' + interpret(overallMean).label + '</div></div>';

      html += '<tr><td>' + esc(sec.title) + '</td>';

        var m = calcSectionMean(types[t], sec, itemNum);

  function renderResponses(r) {
    var html = '<div class="panel active">';
    if (!r.length) {
      html += '<div class="loading">No responses match your filters.</div>';
      html += '</div>';
      return html;
    }
    html += '<p style="font-size:13px;color:var(--muted);margin:0 0 14px;">Showing ' + r.length + ' submissions. Scroll horizontally to see all columns.</p>';
    html += '<div class="table-wrap"><table><thead><tr>';
    html += '<th>#</th><th>Reference</th><th>Submitted</th><th>Name</th><th>Age</th><th>Sex</th><th>User Type</th>';
    for (var k = 1; k <= TOTAL_ITEMS; k++) html += '<th>Q' + k + '</th>';
    html += '<th>Mean</th><th>Comments</th></tr></thead><tbody>';
    r.forEach(function(res, i) {
      var vals = [];
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        if (v) vals.push(v);
      }
      var m = mean(vals);
      var interp = interpret(m);
      var dt = res.submitted_at ? new Date(res.submitted_at).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" }) : "\u2014";
      html += '<tr>';
      html += '<td>' + (i + 1) + '</td>';
      html += '<td style="font-family:monospace;font-size:12px">' + (res.id ? res.id.slice(0, 8).toUpperCase() : "\u2014") + '</td>';
      html += '<td>' + dt + '</td>';
      html += '<td>' + esc(res.respondent_name || "\u2014") + '</td>';
      html += '<td>' + (res.respondent_age || "\u2014") + '</td>';
      html += '<td>' + esc(res.respondent_sex || "\u2014") + '</td>';
      html += '<td>' + esc(res.respondent_user_type || "\u2014") + '</td>';
      for (var k2 = 1; k2 <= TOTAL_ITEMS; k2++) {
        var v2 = (res.answers || {})[String(k2)];
        html += '<td style="text-align:center">' + (v2 || "\u2014") + '</td>';
      }
      html += '<td style="font-weight:700"><span class="interp ' + interp.cls + '">' + m.toFixed(2) + '</span></td>';
      html += '<td style="max-width:180px;white-space:normal;font-size:12px">' + esc(res.comments || "\u2014") + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '</div>';
    return html;
  }

  /* render */
  function render() {
    if (!STATE.loggedIn) {
      root.innerHTML = renderLogin();
      attachLoginHandlers();
      return;
    }
    if (STATE.loading) {
      root.innerHTML = '<div class="loading"><div class="spinner"></div>Loading responses from Supabase...</div>';
      return;
    }
    applyFilters();
    root.innerHTML = renderDashboard();
    attachDashboardHandlers();
    if (STATE.activeTab === "charts") initCharts(STATE.filteredResponses);
  }

  function attachLoginHandlers() {
    var btn = document.getElementById("login-btn");
    var pass = document.getElementById("login-pass");
    var err = document.getElementById("login-err");
    if (btn) btn.addEventListener("click", function() {
      if (pass.value === ADMIN_PASSWORD) {
        STATE.loggedIn = true;
        sessionStorage.setItem("prism_admin", "1");
        loadResponses();
      } else {
        err.style.display = "block";
      }
    });
    if (pass) pass.addEventListener("keydown", function(e) { if (e.key === "Enter") btn.click(); });
  }

  function attachDashboardHandlers() {
    document.querySelectorAll(".tab").forEach(function(t) {
      t.addEventListener("click", function() {
        STATE.activeTab = t.getAttribute("data-tab");
        render();
      });
    });

    var refreshBtn = document.getElementById("refresh-btn");
    if (refreshBtn) refreshBtn.addEventListener("click", function() { loadResponses(); });

    var logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.addEventListener("click", function() {
      STATE.loggedIn = false;
      sessionStorage.removeItem("prism_admin");
      STATE.responses = [];
      render();
    });

    var exportToggle = document.getElementById("export-toggle");
    var exportDropdown = document.getElementById("export-dropdown");
    if (exportToggle && exportDropdown) {
      exportToggle.addEventListener("click", function() { exportDropdown.classList.toggle("show"); });
      document.addEventListener("click", function(e) {
        if (!exportToggle.contains(e.target) && !exportDropdown.contains(e.target)) exportDropdown.classList.remove("show");
      });
    }
    var exportCsv = document.getElementById("export-csv");
    if (exportCsv) exportCsv.addEventListener("click", function() { exportCSV(); });
    var exportJson = document.getElementById("export-json");
    if (exportJson) exportJson.addEventListener("click", function() { exportJSON(); });
    var exportExcel = document.getElementById("export-excel");
    if (exportExcel) exportExcel.addEventListener("click", function() { exportExcelFile(); });

    var fType = document.getElementById("f-type");
    var fFrom = document.getElementById("f-from");
    var fTo = document.getElementById("f-to");
    var fReset = document.getElementById("f-reset");
    if (fType) fType.addEventListener("change", function() { STATE.filters.userType = fType.value; render(); });
    if (fFrom) fFrom.addEventListener("change", function() { STATE.filters.dateFrom = fFrom.value; render(); });
    if (fTo) fTo.addEventListener("change", function() { STATE.filters.dateTo = fTo.value; render(); });
    if (fReset) fReset.addEventListener("click", function() { STATE.filters = { userType: "all", dateFrom: "", dateTo: "" }; render(); });
  }

  async function loadResponses() {
    STATE.loading = true;
    render();
    try {
      var { data, error } = await supabaseClient
        .from("responses")
        .select("*")
        .order("submitted_at", { ascending: false });
      if (error) throw error;
      STATE.responses = data || [];
    } catch (err) {
      console.error("Load error:", err);
      STATE.responses = [];
    }
    STATE.loading = false;
    render();
  }

  function exportCSV() {
    var r = STATE.filteredResponses;
    if (!r.length) return;
    var headers = ["Reference","Submitted","Name","Age","Sex","User Type"];
    for (var k = 1; k <= TOTAL_ITEMS; k++) headers.push("Q" + k);
    headers.push("Mean","Comments");
    var rows = [headers.join(",")];
    r.forEach(function(res) {
      var vals = [];
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        vals.push(v || "");
      }
      var m = mean(vals);
      var ref = res.id ? res.id.slice(0, 8).toUpperCase() : "";
      var dt = res.submitted_at || "";
      var line = [ref, dt, res.respondent_name || "", res.respondent_age || "", res.respondent_sex || "", res.respondent_user_type || ""]
        .concat(vals).concat([m.toFixed(2), res.comments || ""]);
      rows.push(line.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(","));
    });
    var blob = new Blob([rows.join("\n")], { type: "text/csv" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "prism_responses_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
  }

  function exportJSON() {
    var r = STATE.filteredResponses;
    if (!r.length) return;
    var blob = new Blob([JSON.stringify(r, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "prism_responses_" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
  }

  function exportExcelFile() {
    var r = STATE.filteredResponses;
    if (!r.length) return;

    /* ---- Sheet 1: All Responses ---- */
    var headers = ["Reference","Submitted","Name","Age","Sex","User Type"];
    for (var k = 1; k <= TOTAL_ITEMS; k++) headers.push("Q" + k);
    headers.push("Mean","Comments");
    var rows = [headers];
    r.forEach(function(res) {
      var vals = [];
      for (var k = 1; k <= TOTAL_ITEMS; k++) {
        var v = (res.answers || {})[String(k)];
        vals.push(v || "");
      }
      var m = mean(vals);
      var ref = res.id ? res.id.slice(0, 8).toUpperCase() : "";
      var dt = res.submitted_at || "";
      var line = [ref, dt, res.respondent_name || "", res.respondent_age || "", res.respondent_sex || "", res.respondent_user_type || ""]
        .concat(vals).concat([+m.toFixed(2), res.comments || ""]);
      rows.push(line);
    });
    var ws1 = XLSX.utils.aoa_to_sheet(rows);
    ws1["!cols"] = headers.map(function(h, i) { return { wch: i < 6 ? 16 : (i === headers.length - 1 ? 30 : 6) }; });

    /* ---- Sheet 2: Section Means ---- */
    var secHeaders = ["Section", "Items", "Mean", "Interpretation"];
    var secRows = [secHeaders];
    var itemNum = 1;
    SECTIONS.forEach(function(sec) {
      var m = calcSectionMean(r, sec, itemNum);
      var interp = interpret(m);
      secRows.push([sec.title, sec.items.length, +m.toFixed(2), interp.label]);
      itemNum += sec.items.length;
    });
    var ws2 = XLSX.utils.aoa_to_sheet(secRows);
    ws2["!cols"] = [{ wch: 30 }, { wch: 8 }, { wch: 8 }, { wch: 14 }];

    /* ---- Sheet 3: Item Means ---- */
    var itemHeaders = ["#", "Statement", "Mean", "Interpretation"];
    var itemRows = [itemHeaders];
    itemNum = 1;
    SECTIONS.forEach(function(sec) {
      sec.items.forEach(function(text) {
        var m = calcItemMean(r, itemNum);
        var interp = interpret(m);
        itemRows.push([itemNum, text, +m.toFixed(2), interp.label]);
        itemNum++;
      });
    });
    var ws3 = XLSX.utils.aoa_to_sheet(itemRows);
    ws3["!cols"] = [{ wch: 4 }, { wch: 60 }, { wch: 8 }, { wch: 14 }];

    /* ---- Sheet 4: Demographics ---- */
    var demoRows = [["Demographic Breakdown"], [], ["Sex", "Count", "Percentage"]];
    var sexCounts = {};
    r.forEach(function(res) { var s = res.respondent_sex || "Unknown"; sexCounts[s] = (sexCounts[s] || 0) + 1; });
    var totalN = r.length;
    Object.keys(sexCounts).forEach(function(k) {
      demoRows.push([k, sexCounts[k], ((sexCounts[k] / totalN) * 100).toFixed(1) + "%"]);
    });
    demoRows.push([], ["User Type", "Count", "Percentage"]);
    var typeCounts = {};
    r.forEach(function(res) { var t = res.respondent_user_type || "Unknown"; typeCounts[t] = (typeCounts[t] || 0) + 1; });
    Object.keys(typeCounts).forEach(function(k) {
      demoRows.push([k, typeCounts[k], ((typeCounts[k] / totalN) * 100).toFixed(1) + "%"]);
    });
    var ws4 = XLSX.utils.aoa_to_sheet(demoRows);
    ws4["!cols"] = [{ wch: 24 }, { wch: 8 }, { wch: 12 }];

    /* ---- Create workbook ---- */
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws1, "All Responses");
    XLSX.utils.book_append_sheet(wb, ws2, "Section Means");
    XLSX.utils.book_append_sheet(wb, ws3, "Item Means");
    XLSX.utils.book_append_sheet(wb, ws4, "Demographics");
    XLSX.writeFile(wb, "prism_responses_" + new Date().toISOString().slice(0,10) + ".xlsx");
  }

  if (STATE.loggedIn) loadResponses(); else render();
})();
</script>
</body>
</html>
