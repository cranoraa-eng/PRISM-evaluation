    --line: #C9D2E0;

    --surface: #FFFFFF;
    --muted: #5B6B85;

    padding: 32px 16px 64px;

    max-width: 760px;

    box-shadow: 0 1px 2px rgba(22,35,61,0.04), 0 12px 32px -16px rgba(22,35,61,0.18);
    overflow: hidden;
    position: relative;
  }

  #prism-root .shell::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--ink) 0%, var(--ink-2) 55%, var(--gold) 100%);

  #prism-root .masthead {

  #prism-root .eyebrow {

    font-weight: 700;
    color: var(--gold);
    margin: 0 0 8px;
  }
  #prism-root h1.title {
    font-size: 26px;
    margin: 0 0 4px;
    color: var(--ink);
    font-weight: 700;
  }
  #prism-root .subtitle {

  #prism-root .progress-wrap {

  #prism-root .progress-label {

    justify-content: space-between;

    margin-bottom: 6px;
    text-transform: uppercase;
    font-weight: 600;

  #prism-root .progress-track {

    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  #prism-root .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ink-2), var(--gold));
    transition: width 0.35s ease;
    border-radius: 4px;
  }

  #prism-root .stamp {
    position: absolute;
    top: 26px;
    right: 30px;
    width: 68px;
    height: 68px;

    font-family: Georgia, serif;
    font-weight: 700;
    font-size: 10px;
    text-align: center;
    line-height: 1.15;
    letter-spacing: 0.02em;
    opacity: 0.85;

  #prism-root .content {

  #prism-root .section-title {

  #prism-root .section-note {

  #prism-root .group-heading {

  #prism-root .seal {

  #prism-root .done-wrap h2 { font-size: 21px; margin: 0 0 8px; }

  #prism-root .error-state { padding: 40px 36px; text-align: center; }

  #prism-root .offline-banner {

  .skip-link {

  #prism-root .cf-turnstile { transform: scale(0.9); transform-origin: center; }

  #prism-root .response-counter {
    text-align: center;
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 16px;
    padding-top: 16px;

  #prism-root .response-counter b { color: var(--ink); font-size: 15px; }

  #prism-root .consent-box {
    background: var(--paper);

  #prism-root .consent-label {

  #prism-root .saved-indicator {

  function queueSubmission(payload) {
    var queue = [];
    try {

    } catch(e) {}
    queue.push(payload);
    try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue)); } catch(e) {}
  }

  async function flushOfflineQueue() {
    var queue = [];
    try {
      var raw = localStorage.getItem(OFFLINE_QUEUE_KEY);
      if (!raw) return;
      queue = JSON.parse(raw);
    } catch(e) { return; }
    if (!queue.length) return;
    var remaining = [];
    for (var i = 0; i < queue.length; i++) {
      try {
        var { error } = await supabaseClient.from("responses").insert([queue[i]]);
        if (error) { remaining.push(queue[i]); }
      } catch(e) { remaining.push(queue[i]); }
    }
    try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(remaining)); } catch(e) {}
  }

    html += '<div class="field" style="margin-top:24px;padding-top:16px;border-top:1px solid var(--line);">';
    html += '<span class="field-label" id="lang-label">Language / Wika</span>';
    html += '<div class="choice-grid" role="radiogroup" aria-labelledby="lang-label">';
    html += '<button type="button" class="choice-pill' + (state.lang === "en" ? " selected" : "") + '" data-action="setlang" data-val="en" role="radio" aria-checked="' + (state.lang === "en") + '">English</button>';
    html += '<button type="button" class="choice-pill' + (state.lang === "fil" ? " selected" : "") + '" data-action="setlang" data-val="fil" role="radio" aria-checked="' + (state.lang === "fil") + '">Filipino</button>';
    html += '</div></div>';

    html += '</div>';
    return html;
  }

  function renderComments() {
    var html = '<div class="content" id="prism-content">';
    html += '<h2 class="section-title serif">Additional Comments</h2>';
    html += '<p class="section-note">Optional \u2014 share any comments, concerns, or suggestions for improving PRISM.</p>';
    html += '<div class="offline-banner' + (state._isOffline ? " show" : "") + '" role="status">' + t("queued") + '</div>';
    html += '<div class="field"><label class="field-label" for="f-comments">Comments</label><textarea id="f-comments" placeholder="Type your feedback here...">' + esc(state.comments) + '</textarea></div>';
    if (state.submitError) {
      html += '<div class="banner error show" role="alert">' + esc(state.submitError) + '</div>';
    }
    html += '<div class="turnstile-wrap"><div class="cf-turnstile" data-sitekey="0x4AAAAAAAW4t_lYhFwTmSZE" data-callback="onTurnstileSuccess"></div></div>';
    html += '</div>';
    return html;
  }

  function renderDone() {
    return (
      '<div class="done-wrap">' +
        '<div class="seal"><span class="seal-word">RECORDED</span><span class="seal-sub">PRISM SURVEY</span></div>' +
        '<h2 class="serif">Thank you for your response</h2>' +
        '<p>Your evaluation has been recorded and will help improve the PRISM school management portal.</p>' +
        '<div class="response-id">Reference: ' + esc(state.responseId || "") + '</div>' +
        '<p style="font-size:12.5px;color:var(--muted);">Save your reference ID if you wish to withdraw your response later. Contact the researcher and provide this ID to request deletion.</p>' +
        '<div><button type="button" class="btn btn-ghost" id="restart-btn">Submit Another Response</button></div>' +
      '</div>'
    );
  }

  function renderFooterNav(step) {
    var isFirstNav = NAV_STEPS.indexOf(step) === 0;
    var isLastNav = NAV_STEPS.indexOf(step) === NAV_STEPS.length - 1;
    var nextLabel = isLastNav ? (state.submitting ? t("submitting") : t("submit")) : t("next");
    return (
      '<div class="footer-nav">' +
        '<button type="button" class="btn btn-ghost" id="exit-btn" style="font-size:12px;padding:8px 14px;" aria-label="' + t("exit") + '">&#10005; ' + t("exit") + '</button>' +
        '<div class="spacer"></div>' +
        (isFirstNav
          ? '<span></span>'
          : '<button type="button" class="btn btn-ghost" id="back-btn">' + t("back") + '</button>') +
        '<button type="button" class="btn btn-primary" id="next-btn"' + (state.submitting ? " disabled" : "") + '>' + nextLabel + '</button>' +
      '</div>'
    );
  }

  function render() {
    var step = currentStep();
    var missing = step.kind === "survey" ? (state._surveyTouched && state._surveyTouched[step.id] ? stepMissingItems(step) : []) : [];

    var inner = '<div class="shell">' + renderStamp() + '<div class="masthead">' +
      '<p class="eyebrow">PRISM \u00b7 Portal for Records, Information, and School Management</p>' +
      '<h1 class="title serif">Evaluation Questionnaire</h1>' +
      '<p class="subtitle">Usability \u00b7 Functional Suitability \u00b7 User Satisfaction</p>' +
      '</div>';

    inner += renderProgress();

    if (step.kind === "welcome") inner += renderWelcome();
    else if (step.kind === "consent") inner += renderConsent();
    else if (step.kind === "info") inner += renderInfo();
    else if (step.kind === "survey") inner += renderSurveyStep(step, missing);
    else if (step.kind === "comments") inner += renderComments();
    else if (step.kind === "done") inner += renderDone();

    if (step.kind !== "welcome" && step.kind !== "done") inner += renderFooterNav(step);

    inner += '</div>';
    root.innerHTML = inner;
    attachHandlers(step);
  }

  /* Turnstile callback */
  window.onTurnstileSuccess = function(token) {
    state.turnstileToken = token;
  };

  function attachHandlers(step) {
    var startBtn = root.querySelector("#start-btn");
    if (startBtn) startBtn.addEventListener("click", function() {
      state.stepIndex += 1;
      state.surveyStartTime = state.surveyStartTime || Date.now();
      saveProgress();
      render();
    });

    var restartBtn = root.querySelector("#restart-btn");
    if (restartBtn) restartBtn.addEventListener("click", function() {
      state = {
        stepIndex: 0, answers: {},
        respondent: { name: "", age: "", sex: "", userType: "", userTypeOther: "" },
        comments: "", consentGiven: false, consentDate: null, consentVersion: "v1.0",
        submitting: false, submitError: null, responseId: null,
        responseCount: state.responseCount,
        sessionId: genId(), surveyStartTime: null, lang: state.lang,
        turnstileToken: null
      };
      clearProgress();
      render();
    });

    root.querySelectorAll(".likert-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var num = btn.getAttribute("data-num");
        var val = +btn.getAttribute("data-val");
        state.answers[num] = val;
        saveProgress();
        render();
      });
    });

    root.querySelectorAll(".choice-pill").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var field = btn.getAttribute("data-field");
        var action = btn.getAttribute("data-action");
        var val = btn.getAttribute("data-val");
        if (action === "setlang") {
          state.lang = state.lang === val ? state.lang : val;
          document.documentElement.lang = state.lang;
          saveProgress();
          render();
          return;
        }
        state.respondent[field] = state.respondent[field] === val ? "" : val;
        if (field === "userType" && state.respondent[field] !== "IT Expert") state.respondent.userTypeOther = "";
        saveProgress();
        render();
      });
    });

    var consentCheck = root.querySelector("#f-consent");
    if (consentCheck) consentCheck.addEventListener("change", function(e) {
      state.consentGiven = e.target.checked;
      state.consentDate = state.consentGiven ? new Date().toISOString() : null;
      saveProgress();
    });

    var nameInput = root.querySelector("#f-name");
    if (nameInput) nameInput.addEventListener("input", function(e) { state.respondent.name = e.target.value; saveProgress(); });
    var ageInput = root.querySelector("#f-age");
    if (ageInput) ageInput.addEventListener("input", function(e) { state.respondent.age = e.target.value; saveProgress(); });
    var otherInput = root.querySelector("#f-usertype-other");
    if (otherInput) otherInput.addEventListener("input", function(e) { state.respondent.userTypeOther = e.target.value; saveProgress(); });
    var commentsInput = root.querySelector("#f-comments");
    if (commentsInput) commentsInput.addEventListener("input", function(e) { state.comments = e.target.value; saveProgress(); });

    var exitBtn = root.querySelector("#exit-btn");
    if (exitBtn) exitBtn.addEventListener("click", function() {
      if (confirm(t("exitConfirm"))) {
        state.stepIndex = 0;
        saveProgress();
        render();
        root.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });

    var backBtn = root.querySelector("#back-btn");
    if (backBtn) backBtn.addEventListener("click", function() {
      state.stepIndex -= 1;
      saveProgress();
      render();
    });

    var nextBtn = root.querySelector("#next-btn");
    if (nextBtn) nextBtn.addEventListener("click", function() { handleNext(step); });
  }

  function handleNext(step) {
    if (step.kind === "consent") {
      state._consentTouched = true;
      if (!state.consentGiven) { render(); focusFirstError(); return; }
    }
    if (step.kind === "info") {
      state._infoTouched = true;
      var missing = infoMissing();
      if (missing.length) { render(); focusFirstError(); return; }
    }
    if (step.kind === "survey") {
      state._surveyTouched = state._surveyTouched || {};
      state._surveyTouched[step.id] = true;
      var m = stepMissingItems(step);
      if (m.length) { render(); focusFirstError(); return; }
    }
    if (step.kind === "comments") {
      submitResponse();
      return;
    }
    state.stepIndex += 1;
    saveProgress();
    render();
    root.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function focusFirstError() {
    var bad = root.querySelector(".item.invalid, .banner.error.show, [aria-invalid=true]");
    if (bad) {
      bad.scrollIntoView({ behavior: "smooth", block: "center" });
      var firstInput = bad.querySelector("button, input, textarea, [tabindex]");
      if (firstInput) firstInput.focus({ preventScroll: true });
    }
  }

  function genId() {
    if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
    return "resp-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
  }

  var RATE_LIMIT_MS = 30000;

  async function submitResponse() {
    if (state.submitting) return;
    if (!confirm(t("submitConfirm"))) return;

    /* Check Turnstile */
    if (!state.turnstileToken) {
      state.submitError = "Please complete the verification check.";
      render();
      return;
    }

    var lastSub = parseInt(localStorage.getItem("prism_last_submit") || "0");
    if (Date.now() - lastSub < RATE_LIMIT_MS) {
      state.submitError = t("rateLimit");
      state.submitting = false;
      render();
      return;
    }

    state.submitting = true;
    state.submitError = null;
    render();

    var id = genId();
    var timeTaken = state.surveyStartTime ? Math.round((Date.now() - state.surveyStartTime) / 1000) : null;

    var payload = {
      id: id,
      submitted_at: new Date().toISOString(),
      respondent_name: state.respondent.name ? state.respondent.name.replace(/<[^>]*>/g, "").trim() : null,
      respondent_age: state.respondent.age ? Number(state.respondent.age) : null,
      respondent_sex: state.respondent.sex,
      respondent_user_type: state.respondent.userType === "IT Expert"
        ? state.respondent.userTypeOther
        : state.respondent.userType,
      consent_given: state.consentGiven,
      consent_date: state.consentDate,
      consent_version: state.consentVersion,
      answers: state.answers,
      comments: state.comments ? state.comments.replace(/<[^>]*>/g, "").trim() : null,
      session_id: state.sessionId,
      csrf_token: getCsrfToken(),
      device_info: getDeviceInfo(),
      user_agent: getUserAgent(),
      time_taken_sec: timeTaken,
      locale: state.lang,
      survey_version: "1.0",
      response_started_at: state.surveyStartTime ? new Date(state.surveyStartTime).toISOString() : null,
      timings: { started_at: state.surveyStartTime, submitted_at: Date.now() }
    };

    /* Offline queue */
    if (!navigator.onLine) {
      queueSubmission(payload);
      state.submitting = false;
      state._isOffline = true;
      try { localStorage.setItem("prism_last_submit", String(Date.now())); } catch(e) {}
      state.responseId = id.slice(0, 8).toUpperCase();
      state.stepIndex = STEPS.length - 1;
      clearProgress();
      render();
      return;
    }

    try {
      var { error } = await supabaseClient
        .from("responses")
        .insert([payload]);

      if (error) throw error;

      try { localStorage.setItem("prism_last_submit", String(Date.now())); } catch(e) {}
      state.submitting = false;
      state.responseId = id.slice(0, 8).toUpperCase();
      state.stepIndex = STEPS.length - 1;
      clearProgress();
      render();
    } catch (err) {
      console.error("Submit error:", err);
      /* Try offline queue if network error */
      if (!navigator.onLine || err.message === "Failed to fetch") {
        queueSubmission(payload);
        state.submitting = false;
        state._isOffline = true;
        try { localStorage.setItem("prism_last_submit", String(Date.now())); } catch(e) {}
        state.responseId = id.slice(0, 8).toUpperCase();
        state.stepIndex = STEPS.length - 1;
        clearProgress();
        render();
        return;
      }
      state.submitting = false;
      state.submitError = t("submitError");
      render();
    }
  }

  /* unsaved changes warning */
  window.addEventListener("beforeunload", function(e) {
    if (state.stepIndex > 0 && state.stepIndex < STEPS.length - 1) {
      e.preventDefault();
      e.returnValue = "";
    }
  });

  /* init */
  loadProgress();
  fetchResponseCount().then(function() { render(); });
  render();
  flushOfflineQueue();
})();
</script>
</body>
</html>
